  <div class="post-body">写在最前：这大概是我最最喜爱的卡组构建-Roguelike游戏，也是我的启蒙之作。在我后来玩过的虚空穹牢，怪物火车等等相似品类游戏中，也难有出其右者。我在电脑端上有着差不多快400小时，手机端上差不多100小时的游戏经历，我想这足以说明我的经验和证明我对它的喜爱。<div style="line-height: 0.9; text-align: left;"><figure class="post-figure" style="margin-left: 0px; margin-right: auto; text-align: left;"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775255997433-c5sr3.png" alt="图片"><figcaption style="text-align: center;">我的steam游戏时间截图&nbsp;</figcaption><figcaption style="text-align: left;">

<h1 style="text-align: center;">一、核心循环总览：三层嵌套结构<span lang="EN-US"><o:p></o:p></span></h1>

<i><span style="font-size:9.0pt;mso-fareast-font-family:Arial;color:#888780"></span></i></p><p class="MsoNormal" style="margin-top:6.0pt"></p>

<p data-start="41" data-end="135"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p data-start="41" data-end="135"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">&nbsp; &nbsp; &nbsp; &nbsp;宏观循环的核心驱动建立在典型的“钥匙—锁”解锁机制之上。玩家通过完成关键事件（如通关）获取“钥匙”，逐步解锁新的内容，从而在每一局中持续获得“新信息反馈”，有效激发探索动机并延展游戏边界。</span></p><p data-start="137" data-end="256"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">&nbsp; &nbsp; &nbsp; &nbsp; 在前几次通关之后，系统都会开放新卡牌与遗物（强大的全局被动效果），显著扩展构筑空间，使玩家在重复开局中不断重组策略路径，形成由“陌生—掌握”的认知递进体验。与此同时，对于那些已经渐入佳境的玩家，额外的进阶模式通过逐级解锁更高难度，构建稳定的挑战梯度，为高动机玩家提供持续的目标驱动。</span></p><p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><!--StartFragment-->

<!--EndFragment--></span></span></p><p data-start="258" data-end="377"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">&nbsp; &nbsp; &nbsp; &nbsp; 额外的角色解锁更进一步强化了系统深度。各角色采用几乎独立的卡牌池与构筑逻辑（如战士侧重力量堆叠与消耗，猎手侧重中毒与弃牌，机器人围绕充能球机制展开，观者强调两种姿态切换），有效阻断策略复用路径，迫使玩家在不同角色间重建认知模型，从而显著提升整体内容密度与重复游玩价值。</span></p><figure class="post-figure"></figure></span></span><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518821382-dtctu.jpg" alt="图片"><figcaption>萌新解锁的第一组卡牌</figcaption></figure><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518799193-rryzp.jpg" alt="图片"><figcaption>第一场胜利之后就能解锁猎宝了</figcaption></figure><p><br></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US">&nbsp;</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518882889-p4xpr.jpg" alt="图片"><figcaption>游戏的地图路线规划界面</figcaption></figure><p><br></p>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p data-start="66" data-end="150"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p data-start="66" data-end="150"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">中观循环承载的是运行过程中的战略决策层。玩家需要在每一层地图中基于当前构筑状态与资源储备，对路径进行整体规划，在高风险高收益的精英节点与相对安全的常规路线之间做出取舍。</span></p><p data-start="152" data-end="297"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这一层的关键在于决策的不确定性与不可逆性。游戏地图采用随机生成机制，每一层的精英、营地、商店与事件节点分布均不固定，因而不存在可以复用的固定最优路径。虽然地图信息在进入关卡时是完全可见的，但路径一旦选择便无法回退，这使得玩家必须在开局阶段就完成对整层路线的前瞻性判断，同时在过程中对前进方向不断修正。</span></p><p data-start="299" data-end="470"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">与此同时，构筑演化同样具有高度不确定性。玩家在战斗中获得的卡牌奖励来自随机池，无法提前预知。这意味着路径选择不仅取决于当前强度，还需要纳入对未来收益的预判。例如，在决定是否挑战精英时，玩家不仅要评估当前血量与输出能力，还需要考虑精英前的战斗数量（是否有机会获取过渡卡）、精英后的恢复节点（是否存在营地补给），以及是否能够通过商店进行风险调整。</span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><!--StartFragment-->


<!--EndFragment--></p><p data-start="472" data-end="600"></p></span></span><p data-start="472" data-end="600"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在这种机制下，地图随机生成与奖励随机性形成叠加，使每一局的路径决策都转化为一次基于不完全信息的风险博弈。玩家既无法依赖固定策略，也难以完全规划构筑走向，只能在动态变化的条件中持续进行权衡与调整。这种持续变化的决策环境，构成了游戏重复游玩价值的重要来源之一。</span></p>

<p class="MsoNormal" align="center" style="margin-top:3.0pt;margin-right:0cm;
margin-bottom:3.0pt;margin-left:0cm;text-align:center"><i><span style="font-size:9.0pt;mso-fareast-font-family:Arial;color:#888780">驱动力：能量限制（<span lang="EN-US">3 </span>点）<span lang="EN-US">→ </span>手牌优化<span lang="EN-US"> → </span>意图预判<span lang="EN-US"> → </span>伤害<span lang="EN-US"> / </span>防御平衡</span></i><span lang="EN-US"><o:p></o:p></span></p>

<p data-start="43" data-end="185"></p><span style="font-size: 16px;"><span style="font-size: 15px;"><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519191608-9l2km.jpg" alt="图片"><figcaption>一切都是为了玩家秒懂的UI设计</figcaption></figure><p data-start="43" data-end="185"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">微观循环对应战斗内部的战术决策层，其核心由“能量约束”与“敌方意图可视化”两套机制共同构成。每回合固定生成的能量形成明确的资源上限，而敌人的行动意图则完全透明地呈现给玩家。这种“资源限制 + 信息完全公开”的组合，将每一回合的出牌选择转化为具体的攻防取舍问题，持续对玩家施加决策压力。</span></p><p data-start="187" data-end="304"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在这一框架下，战斗的随机性被有效控制在结果波动层，而非信息不对称层。玩家仍可能遭遇敌方连续高强度进攻而陷入被动，也可能因敌方多次低威胁行动而顺利推进，但关键在于：玩家始终能够基于完整信息做出最优判断，而非被不可预期的信息打断决策过程。</span></p><p data-start="306" data-end="426"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">因此，战斗系统从传统的“随机博弈”转化为一种“资源规划驱动的回合制谜题”。玩家需要在有限能量内，围绕伤害输出、防御分配与长期构筑目标进行权衡，使每一回合都具备独立的决策意义。这种设计在保证公平性的前提下，最大化了单局战斗的差异性与策略深度。</span></p><p class="MsoNormal" style="margin-top:5.0pt"><!--StartFragment-->


<!--EndFragment--></p><p data-start="428" data-end="546"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">此外，敌方意图系统也为设计者提供了精细化调控难度的工具。通过调整怪物意图的分布与频率，可以在不改变基础规则的情况下，对整体压力曲线进行微调。这一机制在进阶模式中表现尤为明显，使高难度体验更多体现为决策压缩与容错降低，而非单纯的数值堆叠。</span></p></span></span><h1 style="text-align: center;">二、资源系统与约束设计<span lang="EN-US"><o:p></o:p></span></h1>

<p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 133%; text-align: center;">游戏中的资源被精心设计成多个层次，不同资源的时效性和转化方式共同构建出复杂的决策空间。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:7.0pt"><span lang="EN-US">&nbsp;</span></p>

mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

</div>

<p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US">&nbsp;</span></p>

<table class="MsoNormalTable" border="1" cellspacing="0" cellpadding="0" width="624" style="width: 468pt; border-collapse: collapse; border: none; margin-left: auto; margin-right: auto; text-align: center; display: table;">

  <td width="203" valign="top" style="width:152.0pt;border:solid #D3D1C7 1.0pt;

  8.5pt;mso-fareast-font-family:Arial;color:#7F77DD;text-transform:uppercase">核心约束</span></b><span lang="EN-US"><o:p></o:p></span></p>

  <div style="mso-element:para-border-div;border:none;border-top:solid #D3D1C7 1.0pt;

<p data-start="51" data-end="215"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p data-start="51" data-end="215"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在战斗资源层面，最值得称道的设计之一，是“牌堆打完后重新洗入抽牌堆”的循环结构。这一机制在卡牌游戏中并不主流。多数TCG/CCG（如《炉石传说》《影之诗》或《游戏王》）通常将牌库视为有限资源，一旦抽空，便通过疲劳伤害或直接判负来施加惩罚，其核心逻辑在于约束资源消耗节奏，迫使玩家在“速战速决”与“长期运营”之间进行取舍。</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775409997483-fcjkc.jpg" alt="图片"><figcaption>炉石传说的疲劳机制</figcaption></figure><p data-start="51" data-end="215"><!--StartFragment--><!--StartFragment--><!--EndFragment--><!--EndFragment--></p><p><br></p><p data-start="217" data-end="336"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">相比之下，《杀戮尖塔》采用的是“循环式牌库”设计：当抽牌堆耗尽后，弃牌堆会被重新洗入，形成持续运转的卡组循环。这一改变从根本上重塑了卡组系统的意义——牌库不再是一次性消耗资源，而是一个可以被主动调控的循环系统。</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775413444313-21keg.jpg" alt="图片"><figcaption>小卡组无限最严厉的父亲，喜闻乐见的五福临门</figcaption></figure><p data-start="338" data-end="478"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这一机制带来的直接结果，是卡组规模本身成为更加关键的变量。任何一个卡牌游戏玩家都清楚，卡组越小，那么关键张的上手概率就越大。而这款游戏当中，这一点会被进一步放大：更小的牌组意味着更高的循环效率，使核心卡牌能够更频繁地被抽取与使用。但这也并不意味着大卡组就更加劣势：更大的牌组能提供更高的塞牌抗性与策略覆盖，只不过代价是牺牲循环速度。由此，玩家在构筑阶段不仅需要考虑单卡强度，还必须权衡卡组厚度与运转效率之间的关系。</span></p><p data-start="480" data-end="623"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">同时，部分卡牌效果在这一系统下获得了新的功能维度。以“抽牌”效果为例，在传统卡牌游戏中，其主要作用是获取资源、提升手牌质量；而在《杀戮尖塔》中，抽牌同时意味着“加速循环”，能够更快访问关键组件，从而强化连锁反应与构筑稳定性。这使得抽牌从单一的资源获取手段，转变为调控系统节奏的重要工具。</span></p></span></span>

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>2.3  遗物系统</h2></span></h2></div>

<p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 16px;"><span style="font-size: 15px;">遗物是仅次于卡牌本身的另一类关键构筑资源。它们以被动增益的形式持续生效，并且往往能够直接改写基础规则。遗物之间当然存在协同效应，但这种协同并不只服务于某一特定流派。相较于强绑定流派标签的构筑部件，《杀戮尖塔》的大部分遗物都具有较强的泛用性，且通常在获取后就能立刻发挥作用。这一设计与游戏的整体构筑逻辑高度一致：它并不主要鼓励玩家围绕固定流派进行线性堆叠，而是引导玩家围绕防御、输出、费用与过牌等核心端口进行问题解决式构筑。</span></span></span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519179089-kl4q1.jpg" alt="图片"><figcaption>遗物“作为规则破坏者”</figcaption></figure><span style="font-size: 16px;"><span style="font-size: 15px;"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><p data-start="280" data-end="494">从设计角度看，优秀的遗物并不只是提供数值加成，更重要的是充当“规则破坏者”。它们通过改写原有约束，为玩家打开常规规则之外的构筑路径。例如，外卡钳允许格挡跨回合保留，改变了防御资源必须当回合消耗的基本逻辑；蛇眼则以费用随机化为代价，换取更高的抽牌效率，重新组织了费用与过牌之间的关系。此类设计真正带来的乐趣，并不只是强度提升本身，而是玩家在使用过程中获得一种“绕开常规规则”的发现感，即意识到原本封闭的系统中其实存在新的运转方式。</p><p><!--StartFragment-->
<!--EndFragment--></p><p data-start="496" data-end="709">更有意思的是，这些“规则破坏者”之间并不总是正向叠加，它们彼此之间同样可能发生复杂的化学反应。以蛇眼和符文金字塔为例，前者强化抽牌并扰动费用，后者允许玩家在回合结束时保留手牌，二者单独存在时都极具价值；但一旦组合，蛇眼所带来的大量高费手牌有可能因为金字塔的保留机制而不断滞留在手中，最终反而压缩操作空间，使玩家陷入“有牌却打不出”的失衡状态。也正是在这种并非完全可控的交互中，遗物系统呈现出远超单体效果之和的复杂性与可回味性。</p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519158941-wtwp4.png" alt="图片"><figcaption>精妙的数值设计</figcaption></figure><p>遗物设计的另一层精妙之处，在于其数值配置往往极为克制，却能够显著改变战斗体验。以大量Boss遗物为例，它们的共同特点是提供每回合额外一点能量，但通常附带明确副作用。表面上看，“只增加一点能量，却还要承担代价”似乎并不划算；然而在《杀戮尖塔》的费用结构中，这一点能量的边际价值极高，足以重塑整回合的行动质量。许多能力牌启动费用高昂，往往需要玩家在当回合投入全部资源，却无法立刻获得回报；在只有三点能量时，这种出牌常常意味着防御空缺与战损上升，而多出来的一点能量，则可能让玩家在铺设能力的同时维持最基本的生存。类似地，若手中关键牌集中在二费区间，三费与四费的差异并不只是“多打一张牌”那么简单，而是会直接影响斩杀线、防御线乃至整个回合节奏。</p><p><br></p><p>也就是说，《杀戮尖塔》的遗物之所以设计出色，并不只是在于它们单纯提供了多少强度，而在于它们通过对规则与数值的微调，持续改变玩家理解和运用系统的方式。遗物既是构筑资源，也是战斗规则的再定义装置；它们让构筑不再只是寻找固定流派组件的拼装过程，而成为围绕系统端口不断调试与重组的动态过程。</p></span></span></span><p data-start="496" data-end="709"></p></figcaption><figcaption>

<h1 style="text-align: center;">三、战斗系统核心机制</h1>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>3.1  意图系统：信息透明度设计</h2></span></h2></div><p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 1.4;"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 16px;"><span style="font-size: 15px;"></span></span></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 1.4;"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 16px;"><span style="font-size: 15px;"><span style="font-size: 14px;"><span style="font-size: 13px;"><span style="font-size: 12px;"><span style="font-size: 11px;"><span style="font-size: 12px;"><span style="font-size: 13px;"><span style="font-size: 14px;"><span style="font-size: 15px;">敌方下回合的行动几乎完全公开（包括具体伤害数值、施加的状态效果及特殊能力），是《杀戮尖塔》区别于传统卡牌游戏的关键设计决策之一。</span></span></span></span></span></span></span></span></span></span></span></p>

<figure class="post-figure"></figure></span></span><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519127106-ul6v5.png" alt="图片"><figcaption>三层的小出生面团</figcaption></figure><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">游戏将原本隐藏于系统内部的信息完全外显，构建了一套高度透明的“意图系统”。玩家可以在每一回合开始前，清晰获知敌方即将执行的行为，而无需依赖经验猜测或概率预判。这种设计看似简单，实则从根本上改变了战斗的决策性质。</span></p><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在传统卡牌游戏中，敌方行为往往具有不确定性，玩家需要在不完全信息下进行博弈，决策中不可避免地包含“猜测”与“赌博”成分。以《炉石传说》为例，在对战中玩家无法获知对手下一回合的具体行动。即便面对职业特征明确的对手（如法师可能拥有直伤法术，战士可能具备解场能力），玩家也只能基于经验进行概率判断。在血量较低时，玩家需要猜测对手是否手握斩杀手段，是选择继续铺场争取胜利，还是转为防守规避风险，这本质上是一种建立在不完全信息上的博弈。</span><span style="color: rgb(58, 90, 122); font-size: 11px;"></span></p></span></span><!--StartFragment--><!--EndFragment--><span style="font-size: 16px;"><span style="font-size: 15px;"><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">而在《杀戮尖塔》中，信息不对称被显著削弱，战斗由此转化为基于完全信息的资源规划问题。玩家所面对的，不再是“敌人会做什么”的不确定性，而是“在已知敌方行动的前提下，如何最优分配当前资源”。</span></p><p></p></span></span><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519098489-c8znw.jpg" alt="图片"><figcaption>因此，不可看见意图也可以作为加费遗物的代价</figcaption></figure><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 16px;"><span style="font-size: 15px;">这一转变直接提升了策略密度。玩家需要围绕能量限制、手牌结构与敌方意图，精确安排出牌顺序、攻防比例与资源投入方式，使每一回合都具备明确的决策目标。同时，这种透明机制也显著降低了挫败感的来源。失败不再归因于不可控的随机性，而能够被追溯为具体的决策失误，玩家每一次失败都能清晰找到问题所在 —— 是防御不够、输出不足、还是能量分配失误，而不是一句让人红温的 “我运气不好”。</span></span></span></p>

<p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>3.2  格挡机制的反直觉设计</h2></span></h2></div><span style="font-size: 16px;"><span style="font-size: 15px;"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">

<p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US">《杀戮尖塔》的格挡机制采用了一项颇具反直觉的基础规则：格挡值在每回合结束时会被强制清零，无法跨回合保留。这一设定与多数RPG中“护盾可持续叠加”的常规逻辑形成鲜明对比。正因如此，玩家在每一回合都必须重新评估防御投入，无法依赖既有护盾积累进行被动应对，从而显著提升了防御决策的频率与即时性压力。</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775412237680-htyp5.png" alt="图片"><figcaption>战士哥的3费能力壁垒</figcaption></figure><p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US">这一基础规则的设计价值，并不仅体现在限制本身，更体现在其“可被打破”的特性。以“壁垒”为代表的能力，可以直接改变格挡清零的底层逻辑，使格挡得以跨回合保留，从而将原本短期性的防御资源转化为可累积的长期优势。这种从“即时消耗”到“持续积累”的转变，本质上重构了防御在系统中的角色定位，也由此衍生出截然不同的构筑路径。</span></p><p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US">相较于规则本身，这类“规则例外”更具设计意义。它并非简单提供强度提升，而是通过对基础约束的局部改写，赋予玩家突破系统边界的可能性。在这一过程中，玩家获得的不只是数值收益，更是一种“发现隐藏解法”的认知反馈。也正是这些可被撬动的规则，使基础机制本身变得更具张力与价值。</span></p></span></span></span><p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US"></span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>3.3  状态效果叠加系统</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">游戏中所有强化与弱化效果，均采用清晰且可计算的数值叠加机制。例如，“力量 +2”意味着每一次攻击稳定额外造成2点伤害。绝大多数增益与减益效果都具备直观、可量化与可预测的特征，不依赖随机浮动，也不存在隐藏触发条件。</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519078797-w3h7f.jpg" alt="图片"><figcaption>进行过一次强化的大颚虫</figcaption></figure><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在此基础上，配合完全透明的敌方意图系统，玩家能够在出牌前对结果进行精确预估：包括本回合的总伤害输出、Buff叠加层数以及对敌方状态的削弱程度。这使战斗决策建立在确定性计算之上，玩家的目标不再是“尝试最优解”，而是“推导最优解”。</span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><br></span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这套高确定性的数值体系，构成了卡牌间产生联动的底层结构。不同增益与减益效果之间，并非简单线性叠加，而是通过机制交互形成放大效应，从而显著提升构筑深度。以“力量”与“易伤”为例，前者提升基础伤害，后者按比例放大最终输出，二者叠加后能够使单次攻击的收益成倍增长。</span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><br></span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">正是这种可计算且可预期的协同机制，使卡组构筑从单卡强度的选择，转变为围绕“效果组合与放大路径”的系统设计过程，从而为玩家提供持续的策略空间与探索动力。</span></p>

</span></span><h1 style="text-align: center;">四、卡牌构筑系统</h1>

<p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 133%; text-align: center;">构筑系统是整个游戏体验的核心，它将每局游戏转化为一个独一无二的<span lang="EN-US">"</span>叙事旅程<span lang="EN-US">"</span>。</p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2><!--StartFragment--><!--EndFragment--></h2></span></h2><h2 style="margin: 28px 0px 12px; padding: 0cm; box-sizing: border-box; font-size: 22px; font-weight: 700; color: rgb(255, 255, 255); border: none; font-family: &quot;Share Tech Mono&quot;, monospace; font-style: normal; font-variant-ligatures: normal; font-variant-caps: normal; letter-spacing: 1px; orphans: 2; text-align: left; text-indent: 0px; text-transform: none; widows: 2; word-spacing: 0px; -webkit-text-stroke-width: 0px; white-space: normal; background-color: rgb(3, 8, 16); text-decoration-thickness: initial; text-decoration-style: initial; text-decoration-color: initial;"><span lang="EN-US" style="margin: 0px; padding: 0px; box-sizing: border-box;"><h2>4.1  构筑卡组：我的卡组是怎么变成这个样子的？</h2></span></h2>

<!--StartFragment--><b></b>

</div>

<figure class="post-figure"><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519059225-8qfss.jpg" alt="图片"><figcaption>抓当头冲精英？还是抓不惧战个未来？</figcaption></figure></figure><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><p>战斗路径上的卡牌随机掉落，使构筑并不是预先设计好的蓝图，而是一种在运行过程中不断修正的动态决策。玩家无法像传统构筑型卡牌游戏那样，围绕既定目标稳定收集组件，而只能根据当前掉落、已有卡组结构与后续关卡压力，持续判断“这张牌是否值得拿”。</p><p>这意味着，抓牌的核心问题并不只是“强不强”，还得看看“适不适合现在的卡组”。一张单看数值优秀的卡牌，如果无法嵌入当前的费用结构、输出节奏或防御体系，仍然可能成为拖慢运转的负担；相反，一些牌效并不突出的运转牌，反而可能因为恰好补上当前最缺的环节，而成为维持战局的关键。这种设计使卡牌评价始终依赖具体语境，而不是脱离战局的抽象强度判断。</p><p>也正因如此，《杀戮尖塔》的构筑乐趣，很大程度上来自对“不完美选项”的处理。玩家多数时候并不是在“最优组件”与“无用废牌”之间做选择，而是在几个都不完全理想的方案中，选出那个最符合当前局势的解。构筑因此不再是对成熟流派的机械拼装，而更像是一种临场调试：哪里薄弱，就优先补哪里；哪里已经过剩，就主动克制继续堆叠的冲动。也就是我们常说的面多加水水多加面。</p><p>在这一前提下，删牌的意义也发生了变化。它并不是单纯地减少牌库内容，而是为这种动态调整提供反向修正的机会。玩家前期为了生存不得不接受的低质量过渡牌，未必适合继续保留到中后期；而删牌的价值，恰恰在于允许玩家在构筑方向逐渐清晰后，回头清理那些阶段性合理、但长期低效的选择。换言之，删牌不是对卡组的“削减”，而是对构筑历史的再编辑。</p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519046323-82ioz.jpg" alt="图片"><figcaption>噶人们，我说删牌大于一切！</figcaption></figure><p><br></p><p>因此，随机掉落、抓牌与删牌共同构成了一套持续修正的构筑机制。玩家并不是一次性“造出”一套卡组，而是在整场爬塔过程中不断回应随机性、修补缺口、纠正偏差，最终让卡组在不确定环境中逐步成形。</p><p><br></p></span></span></span>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>4.2  升级作为精炼机制</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">营地可以升级一张卡，将已有卡牌性能提升，而非加入新卡。这让玩家对已有卡组产生<span lang="EN-US">"</span>所有权感<span lang="EN-US">"</span>，并制造<span lang="EN-US">"</span>升哪张<span lang="EN-US">"</span>这一高密度决策时刻。升级机制与删牌机制共同构成卡组优化的两个维度：质量提升和数量精简。<span lang="EN-US"><o:p></o:p></span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><br></p>

<p class="MsoNormal" style="margin-top:6.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif; font-size: 15px;">营地作为单局内稀缺的安全节点，其提供的卡牌升级机制构成了一套区别于“新增卡牌”的深度优化路径。与通过战斗获取新卡不同，升级不会扩充卡组规模，而是直接强化既有卡牌的性能，例如降低费用、提升数值、延长效果或增加抽牌能力。这种“强化现有”而非“引入变量”的设计，使玩家的构筑逐渐从随机累积转向主动打磨。</span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal" style="margin-top:6.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这一机制在体验层面带来了显著的“所有权感”。玩家所强化的并非抽象卡牌，而是一路使用、逐步熟悉的具体组件。卡组不再只是随机获取的结果，而成为一个经过选择与投入不断优化的系统结构，强化了“这一局构筑属于我”的感知。</span></p><p class="MsoNormal" style="margin-top:6.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">与此同时，营地还提供另一项关键行为——休息，用于恢复当前生命值。与升级相比，休息并不直接提升卡组强度，而是为玩家提供生存保障。这使营地决策呈现出明确的权衡关系：选择升级，意味着将资源投入到长期收益与构筑强化中；选择休息，则是优先确保短期生存，降低后续战斗中的失败风险。</span></p><p class="MsoNormal" style="margin-top:6.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">由于营地数量有限，这种“成长 vs 生存”的取舍成为高权重决策。玩家需要根据当前血量、即将面对的敌人类型以及卡组成熟度进行判断：在安全边际充足时倾向升级，以扩大优势；而在状态不稳时则不得不放弃强化机会，通过休息维持运行。这种决策不仅影响单场战斗的结果，也会持续改变整局的风险结构。</span></p><p class="MsoNormal" style="margin-top:6.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">更重要的是，升级机制与删牌机制形成了清晰的结构互补：前者提升单卡质量，后者控制卡组密度。两者共同作用，使构筑逻辑从“扩充数量”转向“优化结构”，即在有限组件中不断提升整体运转效率。而营地中的休息选项，则作为对这一优化过程的约束，使玩家无法无限制追求强度最大化，而必须在成长与生存之间持续平衡。</span></p></span></span><p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"></h2><h2>4.3  构筑作为渐进式叙事</h2>

</div>

<span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">每次战斗胜利后的三选一选牌，大概是这个实际上没有太多文字剧情的游戏里最具叙事感的时刻。玩家在这里拿到的不只是一张新卡牌，更像是在为自己这一局的独特经历写下一段情节。我们会根据自己构筑卡牌的经历说出“爽局”，“农局”，“励志局”这种给人深刻印象的主观判断。从头到尾不断更新策略方向、不断对齐构筑思路的选择过程，会一步步把随机的卡牌组合，变成有逻辑、有节奏、有目标的专属体系。也正是这种持续的策略一致性，让玩家产生极强的沉浸感与代入感，而不再只是单纯闯关打怪。到最后，每一套成型的卡组，都是这一局所有选择、取舍、运气与判断的具象化总和，是一段可以讲给别人听、可以自己回味的个人游戏故事。</span></p></span></span><p class="MsoNormal"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></span></p>

mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>5.2  不能回头的地图设计</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">

<!--StartFragment--></p>

<p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US">&nbsp;玩家可查看完整地图布局，但行进路线一旦选择便无法撤回，必须结合当前卡组状态提前规划全程路线。</span></p>

<!--StartFragment--><p data-start="63" data-end="201"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 8px;"><span style="font-size: 9px;"><span style="font-size: 10px;"><span style="font-size: 11px;"><span style="font-size: 12px;"><span style="font-size: 13px;"><span style="font-size: 14px;"><span style="font-size: 15px;"><p data-start="63" data-end="201"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">相较于中观循环中对路径随机性与风险博弈的整体分析，这里更值得强调的是路径选择所具有的“前置承诺”特性。玩家在进入关卡时即获得完整地图信息，但一旦做出路径决策，便必须承担其在后续阶段不断放大的连锁影响。这意味着，路径选择并非逐步优化的过程，而更接近一次对未来风险结构的整体押注。</span></p>
<p data-start="203" data-end="338"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在这一机制下，决策的关键不在于“当前是否最优”，而在于“这一选择是否具备持续可行性”。玩家需要预判后续多个节点的连续承压能力，例如在早期选择精英路径，不仅是在判断当下是否能够战胜精英，更是在评估自身是否能够在随后的连续战斗中维持状态，而不因资源枯竭或血量崩溃而失去节奏。</span></p>
<p data-start="340" data-end="469"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这种前置承诺机制，使路径规划具备明显的时间延展性。一次看似合理的局部选择，可能在数个节点之后暴露问题；反之，一些短期看似保守的路径，则可能为后续构筑与资源积累提供更稳定的基础。因此，路径选择本质上并不是对单一节点收益的比较，而是对“整段路径表现”的预期管理。</span></p>
<p data-start="471" data-end="602"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">同时，这种不可逆结构也放大了信息判断的权重。由于玩家无法通过试探或回退来修正错误，所有决策都必须在有限信息与不确定预期下完成，从而强化了经验、直觉与系统理解之间的交互。这种设计避免了路径选择被简化为局部最优解的机械计算，而是将其转化为一种带有长期后果的策略判断。</span></p>
<p data-start="604" data-end="702"></p></span></span></span></span></span></span></span></span><p data-start="604" data-end="702"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 14px;"><span style="font-size: 15px;">因此，路径系统的核心价值，不仅在于提供分支选择本身，更在于通过“信息完全公开 + 决策不可撤回”的组合，将玩家置于一种持续承担后果的决策环境之中，使每一次选择都具备时间上的延续性与结构上的影响力。</span></span></span></p><!--EndFragment-->

<p class="MsoNormal" style="margin-top:7.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>5.3  路径规划的核心张力</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">地图上的两难决策</p>

<p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif; font-size: 15px; text-indent: -16pt;">地图路径中的决策，并非简单的收益比较，而是围绕资源分配与风险承受能力展开的结构性权衡。玩家在推进过程中，持续面对一系列具有长期影响的两难选择：</span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoListParagraph" style="margin-top:2.0pt;margin-right:0cm;margin-bottom:
3.0pt;margin-left:32.0pt;text-indent:-16.0pt;mso-list:l0 level1 lfo1"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif; text-indent: -16pt;">精英 vs 普通战斗：精英节点通常提供更高质量的遗物奖励，是构筑跃迁的重要来源，但其战斗强度显著更高，会对当前血量与卡组稳定性提出更严格要求。在资源充足时，挑战精英是一种主动放大收益的策略；而在状态不稳时，则更接近一次以当前生存为代价，换取未来上限的高风险押注。</span></p><p class="MsoListParagraph" style="margin-top:2.0pt;margin-right:0cm;margin-bottom:
3.0pt;margin-left:32.0pt;text-indent:-16.0pt;mso-list:l0 level1 lfo1"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><br></span></p><p class="MsoListParagraph" style="margin-top:2.0pt;margin-right:0cm;margin-bottom:
3.0pt;margin-left:32.0pt;text-indent:-16.0pt;mso-list:l0 level1 lfo1"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">营地：回血 vs 升级：营地提供了“生存保障”与“构筑强化”之间的直接冲突。选择回血可以降低短期失败风险，使当前路径得以延续；而选择升级，则是在牺牲安全边际的前提下，提升卡组长期运转效率。由于营地数量有限，这一决策本质上是在当前稳定性与未来成长潜力之间进行资源再分配。</span></p><p class="MsoListParagraph" style="margin-top:2.0pt;margin-right:0cm;margin-bottom:
3.0pt;margin-left:32.0pt;text-indent:-16.0pt;mso-list:l0 level1 lfo1"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><br></span></p><p class="MsoListParagraph" style="margin-top:2.0pt;margin-right:0cm;margin-bottom:
3.0pt;margin-left:32.0pt;text-indent:-16.0pt;mso-list:l0 level1 lfo1"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">商店路线 vs 事件路线：商店提供的是确定性强化路径，玩家可以通过花费金币对卡组进行针对性调整（购入关键卡牌或删牌）；而事件节点则具有更高的不确定性，其期望收益通常略高，但伴随显著波动风险。这使玩家在路径选择时，需要在“可控优化”与“高波动收益”之间进行取舍。</span></p></span></span>

<h1 style="text-align: center;">六、<span lang="EN-US">Roguelite</span>循环</h1>

<p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 133%; text-align: center;">玩家的长期留存依赖于循环机制，他们在单局结束后仍有持续回归的动力。</p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>6.1  目标结构的阶段性转变</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">解锁<span lang="EN-US">进阶</span>难度，每级叠加负面效果（如精英战斗更难、游戏开始时附加诅咒、<span lang="EN-US">Boss
</span>更多等）。为核心玩家提供更多的挑战梯度，同时不影响普通玩家体验。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US">&nbsp;</span></p><p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 15px;">在初期阶段，玩家的主要目标是“通关”，关注点集中于理解基础机制与构筑逻辑；而随着游玩深入，这一目标会逐渐转移为“优化过程”与“挑战更高难度”。</span></span></p><p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 15px;">这一转变在进阶难度系统中体现得尤为明显。玩家在通关后，会逐步解锁更高等级的进阶难度，每一层都会引入新的限制或负面修正，例如敌人更强、资源获取减少或初始条件变差。在这一过程中，“通关”不再是终点，而成为一个不断被重新定义的标准。</span></span></p><p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 15px;">例如，玩家在基础难度下完成通关，往往意味着已经掌握了基本构筑逻辑；但进入更高进阶后，原本有效的策略可能因资源受限或敌人强化而失效，迫使玩家重新审视卡牌选择、路径规划与资源分配方式。通关的意义由“是否完成”转变为“在更严苛条件下是否仍能完成”。</span></span></p><p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 15px;">因此，目标不再是静态的，而是随着系统变化不断上移：从首次通关，到稳定通关，再到挑战更高进阶等级。元循环的作用，正是在这一过程中持续抬高评价标准，使玩家始终处于一个可追求更优表现的状态。</span></span></p><figure class="post-figure" style="margin-left: 0px; margin-right: auto; text-align: left;"><p data-start="335" data-end="489"></p><!--EndFragment--></figure><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775519032539-uexr0.png" alt="图片"><figcaption>进阶模式的顶点，进阶20！</figcaption></figure><div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>6.2  可比较性与外部参照</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">固定种子<span lang="EN-US">和</span>特殊修改器，全平台玩家使用相同参数，产生竞争性排行榜。将孤立的<span lang="EN-US"> Roguelike </span>体验转化为共同话题与社区叙事<span lang="EN-US">——</span>玩家可以讨论<span lang="EN-US">"</span>今天的每日该怎么打<span lang="EN-US">"</span>，形成集体记忆。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US">&nbsp;</span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">游戏通过每日挑战与排行榜等机制，为玩家提供了外部参照系。玩家不再只与系统对抗，还可以将自己的决策结果与他人进行比较。</span></span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518997743-1sozh.jpg" alt="图片"><figcaption>已严肃参加今日爬塔大学习</figcaption></figure><p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">以每日挑战为例，在相同种子与规则下，不同玩家可能会选择完全不同的构筑路径：有人优先强化输出快速滚雪球，有人则偏向稳健运营延长容错空间。即使起点一致，结果却可能截然不同。这种差异使玩家能够反思自己的决策逻辑，并通过对比他人路线获得新的思路，从而延伸出社区讨论与策略共享。</span></span></p></span></span><p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US"></span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>6.3  自定义模式</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">允许玩家自定义修改器叠加，支持社区分享高难度设置，延伸官方内容的生命周期，体现了<span lang="EN-US"> UGC</span>（用户生成内容）思维在系统设计中的融合。<span lang="EN-US"><o:p></o:p></span></p>

<span lang="EN-US" style="font-size:11.0pt;font-family:&quot;Arial&quot;,sans-serif;
mso-fareast-font-family:等线;mso-fareast-theme-font:minor-fareast;mso-ansi-language:
EN-US;mso-fareast-language:ZH-CN;mso-bidi-language:AR-SA"><br clear="all" style="mso-special-character:line-break;page-break-before:always">
</span>

<p class="MsoNormal"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">在元循环后期，玩家逐渐脱离系统设定的“标准目标”，转而主动定义挑战方式。例如，通过自定义规则、限制自身资源或追求极端构筑，来探索系统边界。</span></span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518980617-m7ave.jpg" alt="图片"><figcaption>自定模式的编辑器</figcaption></figure></span></span><p class="MsoNormal"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span lang="EN-US"></span><span style="font-size: 16px;"><span style="font-size: 15px;"><span lang="EN-US">具体表现为玩家会主动设定额外限制，例如“不删除初始卡牌通关”“只依赖某一核心机制构筑卡组”或“在高进阶难度下尝试极限路线”。在这些情境中，游戏的意义不再来自系统提供的目标，而是来自玩家自行设定的挑战条件。系统因此从“内容提供者”转变为“规则框架”，允许玩家在其中使用新的玩法目标。&nbsp;</span>&nbsp;</span></span></span></p>

<h1 style="text-align: center;">七、随机性设计与可控感维持<span lang="EN-US"><o:p></o:p></span></h1>

<!--StartFragment--><!--EndFragment--><p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 133%; text-align: center;"><span style="text-align: center;">《杀戮尖塔》</span>是一个<span lang="EN-US"> Roguelite </span>游戏，随机性是其核心特征之一。但其随机性的处理方式与大多数游戏不同，特别注重维持玩家的<span lang="EN-US">"</span>可控感<span lang="EN-US">"</span>。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:4.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>7.1  有意义的随机</h2></span></h2>

</div>

<!--StartFragment--><!--EndFragment--><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><span style="text-align: center;">《杀戮尖塔》</span>的随机发生在构筑阶段（牌出现在选项中），而非执行阶段（战斗中的命中率<span lang="EN-US">/</span>闪避率）。玩家面对随机结果后需做主动决策，而非被动承受<span lang="EN-US">——</span>随机性成为<span lang="EN-US">"</span>策略输入<span lang="EN-US">"</span>而非<span lang="EN-US">"</span>结果决定者<span lang="EN-US">"</span>。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">《杀戮尖塔》的随机性主要发生在构筑阶段，而非执行阶段。具体而言，随机体现在卡牌与奖励的出现方式上——玩家面对的是一组不确定的选项；而在战斗执行过程中，诸如伤害计算、状态叠加与敌方行为等关键要素则高度确定。</span></span></p><p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这一设计改变了随机性的功能定位。在传统JRPG或ARPG中，随机性往往作用于执行层，例如攻击命中率、暴击概率或闪避判定，其结果直接影响行动成败。玩家在此过程中更多是被动承受结果，从而产生“结果由随机性决定”的体验。</span></span></p><p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">相比之下，《杀戮尖塔》将随机性前置为“决策输入”。玩家需要在随机提供的选项中进行选择，并为该选择承担后续结果。换言之，随机性并不直接决定胜负，而是塑造决策空间：玩家并非被随机性支配，而是在不断适应随机性、利用随机性进行策略构建。</span></span></p><p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">这一差异使随机性从“结果干扰因素”转变为“设计素材”。在执行层保持高度确定性的前提下，游戏既保留了每局不同的变化，又避免了随机结果对决策反馈的破坏，使玩家能够将成败归因于自身选择，而非运气波动。</span>&nbsp;</span><span style="font-size: 11px;">&nbsp;</span></p></span></span>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>7.2  三选一结构的概率设计</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">选牌时永远是三张，稀有卡有概率出现。这个结构确保玩家有选择余地，且通过稀有度控制强力卡的出现频率，实现期望值的精确调控。即使三张都不理想，玩家仍有<span lang="EN-US">"</span>最次选择<span lang="EN-US">"</span>而非<span lang="EN-US">"</span>无选择<span lang="EN-US">"</span>。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:6.0pt"><span lang="EN-US">&nbsp;</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518954242-799gx.png" alt="图片"><figcaption>问号牌为什么是神？</figcaption></figure><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"></span></p><span style="font-size: 16px;"><span style="font-size: 15px;"><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">战斗奖励采用固定“三选一”的结构，并通过稀有度概率控制高强度卡牌的出现频率。该机制的核心作用，在于为每一次奖励提供稳定且可比较的决策集合，使构筑过程始终建立在多选项权衡之上。</span></p><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">首先，固定选项数量实际上对决策复杂度进行了精确控制。若选项过少，决策容易退化为单一判断；若选项过多，则会显著提高认知负担，削弱选择效率。三选一在信息密度与可处理性之间取得了平衡：既能形成差异，又不会造成过度分析，使玩家能够快速完成判断，同时保持选择的意义。</span></p><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">进一步来看，“三选一”还引入了一种微妙的机会成本结构。选择其中一张卡的同时，意味着主动放弃另外两张潜在路径，这种“未被选择的可能性”会持续影响后续判断。例如，玩家在某一节点放弃了一张关键组件，可能在之后的战斗中意识到该选择的长期影响。这种延迟反馈，使每一次选择都具备路径塑造意义，而不仅是局部优化。</span></p><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">稀有度机制则在这一选择结构之上，引入强度分布的调节维度。高稀有度卡牌以较低概率出现，使其在奖励集合中形成“高价值但不稳定”的选项。这类卡牌一旦出现，往往会改变当前决策权重，甚至诱导玩家调整构筑方向；但其不稳定性又避免了构筑路径被提前锁定，从而维持整体策略空间的开放性。</span></p><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">此外，固定结构还使系统具备良好的可预测节奏。玩家能够预期在每场战斗后获得一次结构一致的选择机会，从而在宏观上形成稳定的构筑推进节奏。这种“规则恒定 + 内容变化”的组合，使玩家既能建立操作预期，又能持续面对新的决策内容。</span></p><p></p></span></span><p><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 16px;"><span style="font-size: 15px;">因此，“三选一 + 稀有度”的设计，并非简单的奖励分发方式，而是一种对决策规模、信息密度与路径分化进行精细控制的结构化机制。它通过限制选项数量、引入相对比较与概率分布，使构筑过程既保持流畅节奏，又具备持续变化的策略空间。</span></span></span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"><span lang="EN-US"><h2>7.3  可修正的随机结果</h2></span></h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">《杀戮尖塔》的随机性设计，并未试图避免不利结果的出现，而是通过构建多层次的容错结构，使玩家即便在不理想的随机条件下，仍然具备调整与修复局势的空间。</p>

<p class="MsoNormal" style="margin-top:3.0pt"><span lang="EN-US">&nbsp;</span></p><figure class="post-figure"><img src="https://cdn.jsdelivr.net/gh/ENDORF1/endorf1.github.io@main/images/1775518928210-g1stl.jpg" alt="图片"><figcaption>女鬼：你 好</figcaption></figure><p class="MsoNormal" style="margin-top:3.0pt"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif; font-size: 15px;">《杀戮尖塔》随机性的可控之处体现在系统提供的多重补救路径上。例如，玩家在抽到不理想手牌时，仍可以通过防御、延缓节奏或保留资源来渡过回合；在构筑阶段选择失误，也可以通过后续的删牌、升级或路径调整逐步修正方向。随机性带来的问题，并不会立即转化为失败，而是被延迟为“需要处理的局面”。</span></p><span style="font-size: 16px;"><span style="font-size: 17px;"><span style="font-size: 16px;"><span style="font-size: 15px;"><p data-start="315" data-end="424"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">更重要的是，系统很少设置“单点失误即崩盘”的结构。大多数失败并非由一次随机结果直接决定，而是多个决策与资源消耗逐步累积的结果。这使玩家始终处于一种“仍有回旋余地”的状态，即便局势不利，也可以通过操作争取时间或寻找转机。</span></p><p data-start="426" data-end="521"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;">从可控感的角度来看，这种设计改变了玩家对随机性的感知方式。随机结果不再意味着失去控制，而是转化为需要被吸收与应对的压力源。玩家的核心任务不再是“避免随机性”，而是“在随机性下维持系统运转”。</span></p><p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%"><!--StartFragment-->



<!--EndFragment--></p><p data-start="523" data-end="605"></p></span></span></span></span><p data-start="523" data-end="605"><span style="font-family: &quot;Noto Sans SC&quot;, sans-serif;"><span style="font-size: 14px;"><span style="font-size: 15px;">因此，《杀戮尖塔》的关键不在于减少随机性本身，而在于通过容错机制，将随机带来的波动转化为可管理的风险区间，使玩家始终保有调整空间与操作余地，从而维持稳定的控制体验。</span></span></span></p>

<p class="MsoNormal"><span lang="EN-US">&nbsp;</span></p>

<h1 style="text-align: center;">八、设计总结：为什么这套循环有效<span lang="EN-US"><o:p></o:p></span></h1>

<p class="MsoNormal" style="margin: 3pt 0cm 5pt; line-height: 133%; text-align: center;">从游戏设计角度，<span lang="EN-US">《杀戮尖塔》</span>的成功可以归结为以下四个核心设计原则：<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"></h2><h2>原则一：决策密度高且均匀分布</h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">从宏观路径（走哪条线）到中观规划（进哪个节点）到微观出牌（这回合先打哪张），每一层都有需要玩家主动判断的时刻。没有<span lang="EN-US">"</span>等待<span lang="EN-US">"</span>或<span lang="EN-US">"</span>无聊时间段<span lang="EN-US">"</span>，维持持续的心理参与感。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"></h2><h2>原则二：失败有意义且具有教育性</h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">死亡原因可溯源（意图透明<span lang="EN-US"> + </span>资源可计算），玩家每局死亡后通常能明确<span lang="EN-US">"</span>下次该怎么做<span lang="EN-US">"</span>，驱动再来一局的动力。死亡不是惩罚，而是学习体验。这与很多<span lang="EN-US">
Roguelike </span>游戏的<span lang="EN-US">"</span>随机死亡<span lang="EN-US">"</span>形成鲜明对比。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"></h2><h2>原则三：构筑是一种渐进式叙事</h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">卡组是<span lang="EN-US">"</span>你这局做的所有决策的总和<span lang="EN-US">"</span>，每局卡组都独一无二，产生可叙述的个人游戏故事，强化情感连接。玩家在描述自己这局游戏时，往往会讲述<span lang="EN-US">"</span>我拿到了什么遗物，因此构建了什么流派<span lang="EN-US">"——</span>这本身就是一种叙事体验。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:5.0pt"><span lang="EN-US">&nbsp;</span></p>

<div style="mso-element:para-border-div;border:none;border-bottom:solid #7F77DD 1.0pt;
mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm 0cm 0cm 0cm">

<h2 style="border:none;mso-border-bottom-alt:solid #7F77DD .5pt;padding:0cm;
mso-padding-alt:0cm 0cm 0cm 0cm"></h2><h2>原则四：三层循环互相强化</h2>

</div>

<p class="MsoNormal" style="margin-top:3.0pt;margin-right:0cm;margin-bottom:5.0pt;
margin-left:0cm;line-height:133%">微观战斗成功<span lang="EN-US"> → </span>中观卡组优化<span lang="EN-US"> → </span>宏观通关解锁，每一层的进步都为下一层积累动能，形成内聚的正反馈系统。没有任何一层是孤立存在的<span lang="EN-US">——</span>战斗的好坏直接影响构筑，构筑的好坏直接影响通关，通关又解锁了新的元进度内容。<span lang="EN-US"><o:p></o:p></span></p>

<p class="MsoNormal" style="margin-top:7.0pt"><span lang="EN-US">&nbsp;</span></p>

  <p class="MsoNormal" style="line-height:133%"><font color="#000000"><span lang="EN-US" style="font-size: 10.5pt; line-height: 133%;">《杀戮尖塔》</span><span style="font-size: 10.5pt; line-height: 133%;">最重要的设计贡献，是证明了<span lang="EN-US" style="">"</span>卡牌构筑<span lang="EN-US" style="">"</span>与<span lang="EN-US" style="">"Roguelike
  </span>随机探索<span lang="EN-US" style="">"</span>可以深度融合：随机性服务于构筑多样性，构筑多样性服务于重复可玩性。它将每局游戏从<span lang="EN-US" style="">"</span>随机闯关<span lang="EN-US" style="">"</span>升华为<span lang="EN-US" style="">"</span>个人化的策略故事<span lang="EN-US" style="">"</span>，这也是为什么即使对同一角色，玩家也能在数百小时的游玩中持续发现新的可能性。这也是为什么，即使玩了四百小时，我还想再来一把。</span></font></p>
