<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>_DEV.LOG · 后台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030810;--dim:#0a1628;--panel:#0d1f35;--border:rgba(0,245,255,.15);
  --cyan:#00f5ff;--magenta:#ff006e;--yellow:#ffe600;--green:#00ff9d;
  --text:#c8e0f0;--muted:#3a5a7a;--white:#fff;
  --glow-c:0 0 8px #00f5ff66,0 0 24px #00f5ff33;
  --font-mono:'Share Tech Mono',monospace;
  --font-body:'Noto Sans SC',sans-serif;
  --font-code:'Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);cursor:auto;}

/* ── LOCK SCREEN ── */
#lock{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;}
#lock-box{background:var(--dim);border:1px solid var(--border);padding:48px 56px;width:400px;max-width:92vw;position:relative;}
#lock-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.lk-tag{font-family:var(--font-mono);font-size:10px;color:var(--magenta);letter-spacing:4px;margin-bottom:16px;display:block;}
.lk-title{font-size:22px;font-weight:700;color:var(--white);letter-spacing:2px;margin-bottom:6px;}
.lk-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:28px;line-height:1.7;}
.lk-input{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.15);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:18px;letter-spacing:6px;padding:12px 16px;outline:none;margin-bottom:8px;}
.lk-err{font-family:var(--font-mono);font-size:10px;color:var(--magenta);letter-spacing:2px;min-height:20px;margin-bottom:12px;display:block;}
.lk-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color .3s;}
.lk-btn::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.lk-btn:hover{color:var(--bg);}
.lk-btn:hover::before{transform:translateX(0);}
@keyframes lkShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* ── CHANGE PASSWORD MODAL ── */
#cpw-modal{position:fixed;inset:0;z-index:9003;background:rgba(3,8,16,.94);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;}
#cpw-modal.show{display:flex;}
#cpw-box{background:var(--dim);border:1px solid var(--border);padding:40px 48px;width:400px;max-width:92vw;position:relative;}
#cpw-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));}
/* ── UPLOAD STATUS ── */
#upload-status{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  z-index:99998;
  background:rgba(4,10,20,.97);
  border:1px solid var(--border);
  padding:12px 24px;
  display:none;align-items:center;gap:12px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:2px;
  min-width:260px;
}
#upload-status.show{display:flex;}
#upload-status.state-loading{border-color:rgba(255,230,0,.3);}
#upload-status.state-ok{border-color:rgba(0,255,157,.3);}
#upload-status.state-err{border-color:rgba(255,0,110,.3);}
.us-spinner{width:14px;height:14px;border:2px solid rgba(255,230,0,.2);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.us-msg{flex:1;}
#upload-status.state-loading .us-msg{color:var(--yellow);}
#upload-status.state-ok .us-msg{color:var(--green);}
#upload-status.state-err .us-msg{color:var(--magenta);}
/* ── TOAST ── */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:99999;font-family:var(--font-mono);font-size:12px;letter-spacing:2px;padding:12px 28px;border:1px solid;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{color:var(--green);border-color:rgba(0,255,157,.35);background:rgba(0,255,157,.08);}
#toast.err{color:var(--magenta);border-color:rgba(255,0,110,.35);background:rgba(255,0,110,.08);}
#toast.info{color:var(--cyan);border-color:rgba(0,245,255,.35);background:rgba(0,245,255,.08);}

/* ── LAYOUT ── */
#app{display:none;height:100vh;flex-direction:column;}
#app.show{display:flex;}

/* top bar */
#topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:52px;background:rgba(4,10,20,.97);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.tb-logo{font-family:var(--font-mono);font-size:14px;color:var(--cyan);letter-spacing:3px;text-shadow:var(--glow-c);white-space:nowrap;}
.tb-logo span{color:var(--magenta);}
.tb-sep{width:1px;height:20px;background:var(--border);}
.tb-nav{display:flex;gap:4px;}
.tb-nav-btn{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:5px 12px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.tb-nav-btn:hover,.tb-nav-btn.active{color:var(--cyan);border-color:rgba(0,245,255,.25);}
.tb-spacer{flex:1;}
.tb-status{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;padding:4px 12px;border:1px solid;}
.tb-status.idle{color:var(--muted);border-color:rgba(255,255,255,.08);}
.tb-status.pushing{color:var(--yellow);border-color:rgba(255,230,0,.3);animation:blink .8s infinite;}
.tb-status.ok{color:var(--green);border-color:rgba(0,255,157,.3);}
.tb-status.err{color:var(--magenta);border-color:rgba(255,0,110,.3);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.tb-btn{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:6px 16px;border:1px solid;background:transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.tb-btn-pub{border-color:var(--cyan);color:var(--cyan);}
.tb-btn-pub:hover{background:var(--cyan);color:var(--bg);}
.tb-btn-new{border-color:rgba(0,245,255,.3);color:var(--muted);}
.tb-btn-new:hover{border-color:var(--cyan);color:var(--cyan);}
.tb-btn-del{border-color:rgba(255,0,110,.3);color:var(--magenta);}
.tb-btn-del:hover{background:rgba(255,0,110,.15);}

/* ── PANELS ── */
#panels{display:flex;flex:1;overflow:hidden;}

/* left: post list */
#post-list-panel{width:280px;flex-shrink:0;background:var(--dim);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#post-list-panel.hidden{display:none;}
.pl-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pl-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:3px;}
.pl-new{font-family:var(--font-mono);font-size:18px;color:var(--muted);cursor:pointer;line-height:1;transition:color .2s;background:none;border:none;}
.pl-new:hover{color:var(--cyan);}
#post-list{flex:1;overflow-y:auto;padding:8px 0;}
#post-list::-webkit-scrollbar{width:4px;}
#post-list::-webkit-scrollbar-track{background:transparent;}
#post-list::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
.post-item{padding:12px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;position:relative;}
.post-item:hover{background:rgba(0,245,255,.04);border-left-color:rgba(0,245,255,.3);}
.post-item.active{background:rgba(0,245,255,.06);border-left-color:var(--cyan);}
.pi-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.post-item.active .pi-title{color:var(--white);}
.pi-meta{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;display:flex;gap:8px;}
.pi-cat{color:var(--magenta);}
.pi-draft{position:absolute;right:12px;top:12px;font-family:var(--font-mono);font-size:9px;color:var(--yellow);letter-spacing:1px;border:1px solid rgba(255,230,0,.3);padding:1px 5px;}

/* right: editor */
#editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#editor-panel.hidden{display:none;}

/* meta bar */
#meta-bar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
#post-title-input{background:transparent;border:none;border-bottom:1px solid rgba(0,245,255,.15);color:var(--white);font-size:22px;font-weight:700;letter-spacing:1px;padding:6px 0;outline:none;width:100%;font-family:var(--font-body);transition:border-color .2s;}
#post-title-input:focus{border-bottom-color:var(--cyan);}
#post-title-input::placeholder{color:var(--muted);}
.meta-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.meta-input{background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.12);color:var(--text);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;padding:5px 10px;outline:none;transition:border-color .2s;}
.meta-input:focus{border-color:var(--cyan);}
.meta-input::placeholder{color:var(--muted);}
.meta-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;}
#cover-upload-btn{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;border:1px dashed rgba(0,245,255,.2);padding:5px 12px;cursor:pointer;transition:all .2s;background:transparent;}
#cover-upload-btn:hover{border-color:var(--cyan);color:var(--cyan);}
#cover-preview{height:32px;width:56px;object-fit:cover;border:1px solid var(--border);display:none;}

/* toolbar */
#editor-toolbar{display:flex;gap:2px;padding:8px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;background:rgba(4,10,20,.5);}
.et-btn{font-family:var(--font-mono);font-size:12px;padding:4px 10px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;min-width:32px;text-align:center;}
.et-btn:hover{color:var(--cyan);border-color:rgba(0,245,255,.2);}
.et-btn.active{color:var(--cyan);border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.05);}
.et-sep{width:1px;height:24px;background:var(--border);margin:0 4px;align-self:center;}

/* editor body */
#editor-wrap{flex:1;display:flex;overflow:hidden;}
#editor-content{flex:1;padding:32px 48px;outline:none;overflow-y:auto;font-size:15px;line-height:1.9;color:var(--text);font-family:var(--font-body);}
#editor-content::-webkit-scrollbar{width:6px;}
#editor-content::-webkit-scrollbar-track{background:transparent;}
#editor-content::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px;}
#editor-content:empty::before{content:'开始写作...';color:var(--muted);pointer-events:none;}
#editor-content h1{font-size:28px;font-weight:700;color:var(--white);margin:32px 0 16px;padding-left:16px;border-left:4px solid var(--cyan);}
#editor-content h2{font-size:22px;font-weight:700;color:var(--white);margin:28px 0 12px;padding-left:12px;border-left:3px solid var(--magenta);}
#editor-content h3{font-size:18px;font-weight:700;color:var(--white);margin:24px 0 10px;padding-left:10px;border-left:2px solid var(--yellow);}
#editor-content p{margin:0 0 12px;color:var(--text);}
#editor-content strong{color:var(--white);font-weight:700;}
#editor-content em{color:var(--cyan);font-style:italic;}
#editor-content ul,#editor-content ol{margin:8px 0 16px 24px;}
#editor-content li{margin-bottom:6px;color:var(--text);}
#editor-content a{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,245,255,.3);}
#editor-content blockquote{border-left:3px solid var(--cyan);padding:12px 20px;margin:16px 0;background:rgba(0,245,255,.04);color:var(--muted);}
#editor-content hr{border:none;border-top:1px solid var(--border);margin:32px 0;}
#editor-content img{max-width:100%;border:1px solid var(--border);margin:8px 0;}

/* code blocks in editor */
#editor-content pre{background:#0a0e1a;border:1px solid rgba(0,245,255,.15);border-radius:0;margin:16px 0;overflow:hidden;position:relative;}
#editor-content pre .code-lang{position:absolute;top:0;right:0;font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;padding:6px 12px;background:rgba(0,245,255,.05);border-bottom:1px solid rgba(0,245,255,.1);border-left:1px solid rgba(0,245,255,.1);}
#editor-content pre code{display:block;padding:16px 20px;font-family:var(--font-code);font-size:13px;line-height:1.7;color:#a8c8e8;overflow-x:auto;counter-reset:line;}
#editor-content pre code .line{display:block;position:relative;padding-left:40px;}
#editor-content pre code .line::before{content:counter(line);counter-increment:line;position:absolute;left:0;width:30px;text-align:right;color:var(--muted);user-select:none;font-size:11px;}

/* insert code modal */
#code-modal{position:fixed;inset:0;z-index:9000;background:rgba(3,8,16,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
#code-modal.show{display:flex;}
#code-box{background:var(--dim);border:1px solid var(--border);width:660px;max-width:95vw;position:relative;}
#code-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.cb-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.cb-title{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:3px;}
.cb-close{font-family:var(--font-mono);font-size:16px;color:var(--muted);cursor:pointer;background:none;border:none;transition:color .2s;}
.cb-close:hover{color:var(--magenta);}
.cb-body{padding:20px;}
.cb-lang{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.15);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:12px;letter-spacing:2px;padding:8px 12px;outline:none;margin-bottom:12px;}
.cb-code{width:100%;height:200px;background:#0a0e1a;border:1px solid rgba(0,245,255,.15);color:#a8c8e8;font-family:var(--font-code);font-size:13px;line-height:1.7;padding:14px 16px;outline:none;resize:vertical;tab-size:2;}
.cb-insert{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:12px;position:relative;overflow:hidden;transition:color .3s;}
.cb-insert::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.cb-insert:hover{color:var(--bg);}
.cb-insert:hover::before{transform:translateX(0);}

/* gh config modal */
#gh-modal{position:fixed;inset:0;z-index:99990;background:rgba(3,8,16,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
#gh-modal.show{display:flex;}
#gh-box{background:var(--dim);border:1px solid var(--border);width:420px;max-width:92vw;position:relative;padding:40px 48px;}
#gh-box::before{pointer-events:none;}
#gh-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.gh-field{margin-bottom:14px;}
.gh-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:6px;}
.gh-input{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.12);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:13px;letter-spacing:2px;padding:10px 12px;outline:none;}
.gh-save{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;position:relative;overflow:hidden;transition:color .3s;}
.gh-save::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.gh-save:hover{color:var(--bg);}
.gh-save:hover::before{transform:translateX(0);}
.gh-cancel{width:100%;padding:8px;background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:8px;transition:color .2s;text-transform:uppercase;}
.gh-cancel:hover{color:var(--magenta);}

/* push log */
#push-log{position:fixed;bottom:24px;right:24px;z-index:8000;width:320px;background:rgba(4,10,20,.97);border:1px solid var(--border);display:none;flex-direction:column;max-height:200px;}
#push-log.show{display:flex;}
.pl-log-header{padding:8px 14px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;display:flex;justify-content:space-between;align-items:center;}
.pl-log-close{cursor:pointer;color:var(--muted);transition:color .2s;background:none;border:none;font-size:14px;}
.pl-log-close:hover{color:var(--magenta);}
#push-log-body{padding:10px 14px;overflow-y:auto;flex:1;font-family:var(--font-mono);font-size:11px;line-height:2;letter-spacing:1px;}
.pl-info{color:var(--muted);}
.pl-ok{color:var(--green);}
.pl-err{color:var(--magenta);}
.pl-spin{color:var(--yellow);}

/* works / gallery / about panels */
#page-panel{flex:1;display:none;flex-direction:column;overflow:hidden;}
#page-panel.show{display:flex;}
.pp-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.pp-title{font-family:var(--font-mono);font-size:13px;color:var(--cyan);letter-spacing:3px;}
.pp-hint{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;}
.pp-body{flex:1;overflow-y:auto;padding:32px;}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.pp-card{background:var(--dim);border:1px solid var(--border);padding:20px;position:relative;cursor:pointer;transition:border-color .2s;}
.pp-card:hover{border-color:rgba(0,245,255,.3);}
.pp-card-img{width:100%;height:140px;object-fit:cover;border:1px solid var(--border);margin-bottom:12px;display:block;background:rgba(0,245,255,.04);}
.pp-card-img-placeholder{width:100%;height:140px;background:rgba(0,245,255,.04);border:1px dashed rgba(0,245,255,.15);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;}
.pp-card-img-placeholder:hover{border-color:var(--cyan);color:var(--cyan);}
.pp-card-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px;}
.pp-card-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.pp-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.pp-tag{font-family:var(--font-mono);font-size:10px;color:var(--cyan);border:1px solid rgba(0,245,255,.25);padding:2px 8px;letter-spacing:1px;}
.pp-card-del{position:absolute;top:10px;right:10px;background:rgba(255,0,110,.12);border:1px solid rgba(255,0,110,.3);color:var(--magenta);font-family:var(--font-mono);font-size:10px;padding:2px 7px;cursor:pointer;opacity:0;transition:opacity .2s;}
.pp-card:hover .pp-card-del{opacity:1;}
.pp-add{background:transparent;border:1px dashed rgba(0,245,255,.18);display:flex;align-items:center;justify-content:center;height:200px;cursor:pointer;color:var(--muted);font-family:var(--font-mono);font-size:13px;letter-spacing:2px;transition:all .2s;}
.pp-add:hover{border-color:var(--cyan);color:var(--cyan);}

/* about editor */
#about-editor{flex:1;padding:32px 48px;outline:none;overflow-y:auto;font-size:15px;line-height:1.9;color:var(--text);}
#about-editor h1{font-size:28px;font-weight:700;color:var(--white);margin:0 0 16px;padding-left:16px;border-left:4px solid var(--cyan);}
#about-editor p{margin:0 0 12px;}
#about-editor strong{color:var(--white);font-weight:700;}

/* image upload input (hidden) */
#img-file-input,#cover-file-input,#pp-img-input{display:none;}

/* card edit modal */
#card-modal{position:fixed;inset:0;z-index:99999;background:rgba(3,8,16,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
#card-modal.show{display:flex;}
#card-box{background:var(--dim);border:1px solid var(--border);width:520px;max-width:92vw;position:relative;padding:40px 44px;}
#card-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.card-field{margin-bottom:14px;}
.card-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:6px;}
.card-input,.card-textarea{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.12);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:13px;letter-spacing:1px;padding:8px 12px;outline:none;font-family:var(--font-body);}
.card-textarea{height:80px;resize:vertical;font-size:13px;}
.card-img-preview{width:100%;height:100px;object-fit:cover;border:1px solid var(--border);margin-bottom:8px;display:none;}
.focus-picker-wrap{position:relative;display:none;margin-bottom:8px;}
.focus-picker-wrap.show{display:block;}
.focus-picker-img{width:100%;height:180px;object-fit:cover;display:block;border:1px solid var(--border);cursor:crosshair;}
.focus-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--cyan);border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 8px rgba(0,245,255,.8);transition:left .1s,top .1s;}
.focus-hint{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;display:none;}
.focus-picker-wrap.show + .focus-hint{display:block;}
.card-img-upload{width:100%;padding:8px;background:transparent;border:1px dashed rgba(0,245,255,.2);color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-align:center;}
.card-img-upload:hover{border-color:var(--cyan);color:var(--cyan);}
.card-save{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;position:relative;overflow:hidden;transition:color .3s;}
.card-save::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.card-save:hover{color:var(--bg);}
.card-save:hover::before{transform:translateX(0);}
.card-cancel{width:100%;padding:8px;background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:6px;transition:color .2s;text-transform:uppercase;}
.card-cancel:hover{color:var(--magenta);}
</style>

<script>
/* ══════════════════════════════════════
   PASSWORD
══════════════════════════════════════ */
let PW_HASH = 'aaffebecec560fec66e75f24062224ffa4e07696d2ae9a1fee3707c3f8fd9373';

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const val=document.getElementById('lk-input').value;
  const hash=await sha256(val);
  if(hash===PW_HASH){
    __aesKey = await deriveKey(val); // derive encryption key from password
    document.getElementById('lock').remove();
    document.getElementById('app').classList.add('show');
    init();
  } else {
    const err=document.getElementById('lk-err');
    err.textContent='// 密码错误';
    const inp=document.getElementById('lk-input');
    inp.value='';
    inp.style.animation='lkShake .35s ease';
    setTimeout(()=>inp.style.animation='',400);
  }
}
document.getElementById('lk-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let posts   = JSON.parse(localStorage.getItem('posts')   || '[]');
let works   = JSON.parse(localStorage.getItem('works')   || '[]');
let gallery = JSON.parse(localStorage.getItem('gallery') || '[]');
// New category-based structure - migrate if needed
let galleryCategories = JSON.parse(localStorage.getItem('galleryCategories') || JSON.stringify([
  {name:'插画作品', slug:'illust', color:'c1', items:[]},
  {name:'漫展周边', slug:'merch',  color:'c2', items:[]},
  {name:'同人创作', slug:'fanwork',color:'c3', items:[]},
  {name:'更多作品', slug:'other',  color:'c4', items:[]}
]));
let aboutHTML = localStorage.getItem('aboutHTML') || '<h1>关于我</h1><p>在这里介绍你自己...</p>';

let currentPost = null;
let currentTab  = 'blog';
let editingCardType = null;
let editingCardIdx  = null;
let cardImgData = null;
let cardImgPos = "50% 50%"; // object-position value
let coverData   = null;

function saveState(){
  localStorage.setItem('posts',   JSON.stringify(posts));
  localStorage.setItem('works',   JSON.stringify(works));
  localStorage.setItem('gallery', JSON.stringify(gallery));
  localStorage.setItem('galleryCategories', JSON.stringify(galleryCategories));
  localStorage.setItem('aboutHTML', aboutHTML);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function init(){
  loadGhConfig();
  renderPostList();
  if(posts.length) selectPost(0);
  else newPost();
  setStatus('idle','// 就绪');
  // set today as default date
  document.getElementById('post-date').value = new Date().toISOString().slice(0,10);
}

/* ══════════════════════════════════════
   TABS
══════════════════════════════════════ */
function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tb-nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const blogLeft   = document.getElementById('post-list-panel');
  const blogRight  = document.getElementById('editor-panel');
  const pagePanel  = document.getElementById('page-panel');
  const pubBtn     = document.getElementById('pub-btn');

  if(tab==='blog'){
    blogLeft.classList.remove('hidden');
    blogRight.classList.remove('hidden');
    pagePanel.classList.remove('show');
    pubBtn.textContent='⬆ 发布';
  } else {
    blogLeft.classList.add('hidden');
    blogRight.classList.add('hidden');
    pagePanel.classList.add('show');
    pubBtn.textContent='⬆ 推送更新';
    renderPagePanel(tab);
  }
}

/* ══════════════════════════════════════
   POST LIST
══════════════════════════════════════ */
function renderPostList(){
  const el=document.getElementById('post-list');
  el.innerHTML='';
  if(!posts.length){
    el.innerHTML='<div style="padding:20px 16px;font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;">// 暂无文章<br>点击 ＋ 新建</div>';
    return;
  }
  posts.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='post-item'+(currentPost===i?' active':'');
    d.innerHTML=`
      <div class="pi-title">${p.title||'（无标题）'}</div>
      <div class="pi-meta">
        <span class="pi-cat">${p.cat||'未分类'}</span>
        <span>${p.date||''}</span>
      </div>
      ${p.draft?'<span class="pi-draft">草稿</span>':''}
    `;
    d.onclick=()=>selectPost(i);
    el.appendChild(d);
  });
}

function selectPost(i){
  currentPost=i;
  const p=posts[i];
  document.getElementById('post-title-input').value=p.title||'';
  document.getElementById('post-cat').value=p.cat||'';
  document.getElementById('post-tags').value=(p.tags||[]).join(', ');
  document.getElementById('post-date').value=p.date||new Date().toISOString().slice(0,10);
  document.getElementById('editor-content').innerHTML=p.content||'';
  coverData=p.cover||null;
  const prev=document.getElementById('cover-preview');
  if(coverData){prev.src=coverData;prev.style.display='block';}
  else{prev.style.display='none';}
  renderPostList();
}

function saveCurrentPost(isDraft=true){
  if(currentPost===null)return;
  const p=posts[currentPost];
  p.title=document.getElementById('post-title-input').value||'（无标题）';
  p.cat=document.getElementById('post-cat').value||'未分类';
  p.tags=document.getElementById('post-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  p.date=document.getElementById('post-date').value||new Date().toISOString().slice(0,10);
  p.content=document.getElementById('editor-content').innerHTML;
  p.cover=coverData;
  p.draft=isDraft;
  p.slug=slugify(p.title);
  saveState();
  renderPostList();
}

function newPost(){
  const p={title:'',cat:'',tags:[],date:new Date().toISOString().slice(0,10),content:'',cover:null,draft:true,slug:''};
  posts.unshift(p);
  saveState();
  selectPost(0);
  document.getElementById('post-title-input').focus();
  showToast('info','新文章已创建，开始写作吧');
}

function slugify(str){
  return str.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g,'-').replace(/^-|-$/g,'') || 'post-'+Date.now();
}

/* auto-save every 10s */
setInterval(()=>{if(currentPost!==null)saveCurrentPost(true);},10000);

/* ══════════════════════════════════════
   EDITOR
══════════════════════════════════════ */
function exec(cmd,val=null){document.getElementById('editor-content').focus();document.execCommand(cmd,false,val);}

function fmt(type){
  const ed=document.getElementById('editor-content');
  ed.focus();
  const sel=window.getSelection();
  const text=sel.toString()||'';
  let node;
  if(type==='h1'){node=document.createElement('h1');node.textContent=text||'标题一';}
  else if(type==='h2'){node=document.createElement('h2');node.textContent=text||'标题二';}
  else if(type==='h3'){node=document.createElement('h3');node.textContent=text||'标题三';}
  else if(type==='ul'){document.execCommand('insertUnorderedList');return;}
  else if(type==='ol'){document.execCommand('insertOrderedList');return;}
  else if(type==='blockquote'){
    node=document.createElement('blockquote');node.textContent=text||'引用内容';
  }
  else if(type==='hr'){
    document.execCommand('insertHTML',false,'<hr>');return;
  }
  if(node){
    if(sel.rangeCount){
      const range=sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(node);
      range.setStartAfter(node);
      sel.removeAllRanges();sel.addRange(range);
    } else {
      ed.appendChild(node);
    }
  }
}

function openCodeModal(){
  document.getElementById('code-lang').value='';
  document.getElementById('code-content').value='';
  document.getElementById('code-modal').classList.add('show');
  setTimeout(()=>document.getElementById('code-lang').focus(),80);
}
function closeCodeModal(){document.getElementById('code-modal').classList.remove('show');}

function insertCodeBlock(){
  const lang=document.getElementById('code-lang').value.trim()||'code';

/* ══════════════════════════════════════
   TOKEN CRYPTO  (AES-256-GCM, key from PBKDF2)
   index.html 和 admin.html 共用同一份密文
   localStorage key: "gh_token_enc"
══════════════════════════════════════ */
let __aesKey = null; // 登录后在内存持有，页面关闭即消失

async function deriveKey(password) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode('gh-token-salt-v1'), iterations:200000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptToken(token) {
  if (!__aesKey || !token) return;
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, __aesKey, new TextEncoder().encode(token));
  const b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
  localStorage.setItem('gh_token_enc', b64(iv)+':'+b64(ct));
}
async function decryptToken() {
  if (!__aesKey) return null;
  const stored = localStorage.getItem('gh_token_enc');
  if (!stored) return null;
  try {
    const [ivB64,ctB64] = stored.split(':');
    const fb64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
    const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:fb64(ivB64)}, __aesKey, fb64(ctB64));
    return new TextDecoder().decode(pt);
  } catch { return null; }
}
let GH={user:'',repo:'',token:''};

async function loadGhConfig(){
  GH.user  = localStorage.getItem('gh_user')  || '';
  GH.repo  = localStorage.getItem('gh_repo')  || '';
  const t = await decryptToken();
  if(t) GH.token = t;
}
function openGhConfig(){
  document.getElementById('gh-user').value  = GH.user;
  document.getElementById('gh-repo').value  = GH.repo;
  decryptToken().then(t=>{ document.getElementById('gh-token').value = t || GH.token || ''; });
  document.getElementById('gh-modal').classList.add('show');
}
function closeGhConfig(){document.getElementById('gh-modal').classList.remove('show');}
function saveGhConfig(){
  const user=document.getElementById('gh-user').value.trim();
  const repo=document.getElementById('gh-repo').value.trim();
  const token=document.getElementById('gh-token').value.trim();
  if(!user||!repo||!token){showToast('err','请填写所有 GitHub 配置项');return;}
  GH.user=user; GH.repo=repo; GH.token=token;
  localStorage.setItem('gh_user',GH.user);
  localStorage.setItem('gh_repo',GH.repo);
  encryptToken(token); // save encrypted token
  localStorage.removeItem('gh_token'); // remove any old plaintext token
  closeGhConfig();
  showToast('ok','GitHub 配置已保存 ✓');
}

function setStatus(type,msg){
  const el=document.getElementById('tb-status');
  el.className='tb-status '+type;
  el.textContent=msg;
}

function pushLog(msg,type='info'){
  const log=document.getElementById('push-log');
  const body=document.getElementById('push-log-body');
  log.classList.add('show');
  const d=document.createElement('div');
  d.className='pl-'+type;
  const icons={info:'// ',ok:'✓ ',err:'✕ ',spin:'⟳ '};
  d.textContent=(icons[type]||'')+msg;
  body.appendChild(d);
  body.scrollTop=body.scrollHeight;
}

async function ghPut(path,content,msg){
  const apiBase=`https://api.github.com/repos/${GH.user}/${GH.repo}/contents/${path}`;
  const headers={'Authorization':`token ${GH.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  const encoded=btoa(unescape(encodeURIComponent(content)));
  let sha=null;
  const getRes=await fetch(apiBase,{headers});
  if(getRes.ok){const d=await getRes.json();sha=d.sha;}
  else if(getRes.status===401){throw new Error('Token 无效，请检查 GitHub 配置');}
  else if(getRes.status===403){throw new Error('Token 权限不足，请勾选 repo 权限');}
  const body={message:msg,content:encoded,...(sha?{sha}:{})};
  const putRes=await fetch(apiBase,{method:'PUT',headers,body:JSON.stringify(body)});
  if(!putRes.ok){const d=await putRes.json().catch(()=>({}));throw new Error(d.message||'推送失败 HTTP '+putRes.status);}
}

async function publishCurrent(){
  if(!GH.token) GH.token = await decryptToken() || '';
  if(!GH.user||!GH.repo||!GH.token){openGhConfig();return;}
  document.getElementById('push-log-body').innerHTML='';

  if(currentTab==='blog'){
    await publishPost();
  } else {
    await pushPageData();
  }
}

async function publishPost(){
  saveCurrentPost(false);
  const p=posts[currentPost];
  if(!p.title){showToast('err','请先填写文章标题');return;}
  setStatus('pushing','// 推送中...');
  pushLog('准备发布：'+p.title,'spin');
  try{
    // 1. generate post HTML
    pushLog('生成文章页面...','spin');
    const postHtml=buildPostHTML(p);
    await ghPut(`blog/${p.slug}.html`,postHtml,`post: ${p.title}`);
    pushLog(`文章页面已推送 → blog/${p.slug}.html`,'ok');

    // 2. update blog index
    pushLog('更新博客列表页...','spin');
    const indexHtml=buildBlogIndexHTML();
    await ghPut('blog/index.html',indexHtml,'update: blog index');
    pushLog('博客列表页已更新','ok');

    // homepage loads posts dynamically from localStorage - no push needed
    pushLog('全部完成 · Netlify 将在约1分钟内自动部署','info');
    showToast('ok','发布成功 · Netlify 约1分钟后更新 ✓');
    setTimeout(()=>setStatus('idle','// 就绪'),4000);
  }catch(e){
    setStatus('err','// 发布失败');
    const msg=e.message.includes('fetch')?'网络连接失败，请检查梯子':e.message;
    pushLog(msg,'err');
    showToast('err','发布失败：'+msg);
  }
}

async function pushPageData(){
  setStatus('pushing','// 推送中...');
  pushLog('推送页面数据...','spin');
  try{
    if(currentTab==='works'){
      if(works.length === 0){
        pushLog('警告：项目列表为空，跳过推送以避免覆盖已有内容','err');
        showToast('err','项目列表为空，请先在后台添加项目');
        setStatus('idle','// 已跳过');
        return;
      }
      pushLog('推送游戏项目页...','spin');
      await ghPut('works/index.html',buildWorksHTML(),'update: works page');
      pushLog('游戏项目页已推送','ok');
    } else if(currentTab==='gallery'){
      if(galleryCategories.every(cat=>cat.items.length===0)){
        pushLog('警告：所有分类均为空，跳过推送以避免覆盖已有内容','err');
        showToast('err','画廊内容为空，请先在后台添加作品');
        setStatus('idle','// 已跳过');
        return;
      }
      pushLog('推送同人画廊列表页...','spin');
      await ghPut('gallery/index.html',buildGalleryHTML(),'update: gallery page');
      pushLog('同人画廊列表页已推送','ok');
      // push each category page + item detail pages
      for(const cat of galleryCategories){
        pushLog(`推送分类页 ${cat.name}...`,'spin');
        await ghPut(`gallery/${cat.slug}/index.html`,buildCategoryHTML(cat),`gallery category: ${cat.name}`);
        pushLog(`分类页已推送 → gallery/${cat.slug}/`,'ok');
        for(const item of cat.items){
          const slug=item.slug||slugify(item.title);
          pushLog(`推送作品 ${item.title}...`,'spin');
          await ghPut(`gallery/${cat.slug}/${slug}.html`,buildItemDetailHTML(cat,item),`gallery item: ${item.title}`);
          pushLog(`作品页已推送 → gallery/${cat.slug}/${slug}.html`,'ok');
        }
      }
    } else if(currentTab==='about'){
      aboutHTML=document.getElementById('about-editor')?.innerHTML||aboutHTML;
      saveState();
      pushLog('推送关于我页...','spin');
      await ghPut('about/index.html',buildAboutHTML(),'update: about page');
      pushLog('关于我页已推送','ok');
    }
    // homepage loads data dynamically from localStorage - no push needed
    pushLog('完成 · 首页将自动读取最新数据','info');
    setStatus('ok','// 推送成功');
    pushLog('Netlify 将在约1分钟内自动部署','info');
    showToast('ok','推送成功 · Netlify 约1分钟后更新 ✓');
    setTimeout(()=>setStatus('idle','// 就绪'),4000);
  }catch(e){
    setStatus('err','// 推送失败');
    const msg=e.message.includes('fetch')?'网络连接失败，请检查梯子':e.message;
    pushLog(msg,'err');
    showToast('err','推送失败：'+msg);
  }
}

    cx.drawImage(im,0,0,cv.width,cv.height);

    var wc=document.createElement('canvas');

    wx.restore();

    // toDataURL 触发时返回水印版
    var _orig=cv.toDataURL.bind(cv);
    cv.toDataURL=function(){return wc.toDataURL.apply(wc,arguments);};
    cv.toBlob=function(cb,type,q){return wc.toBlob(cb,type,q);};

})();

let _uploadStatusTimer = null;

function showCardUploadStatus(state, msg){
  const el = document.getElementById('card-upload-status');
  const spinner = document.getElementById('card-us-spinner');
  const msgEl = document.getElementById('card-us-msg');
  if(state === 'hidden'){ el.style.display='none'; return; }
  el.style.display = 'flex';
  spinner.style.display = state === 'loading' ? 'block' : 'none';
  msgEl.textContent = msg;
  if(state === 'ok') msgEl.style.color = 'var(--green)';
  else if(state === 'err') msgEl.style.color = 'var(--magenta)';
  else msgEl.style.color = 'var(--yellow)';
  if(state !== 'loading') setTimeout(()=>showCardUploadStatus('hidden',''), 3000);
}
function showUploadStatus(state, msg){
  const el = document.getElementById('upload-status');
  const spinner = document.getElementById('us-spinner');
  const msgEl = document.getElementById('us-msg');
  el.className = 'show state-' + state;
  msgEl.textContent = msg;
  spinner.style.display = state === 'loading' ? 'block' : 'none';
  if(_uploadStatusTimer) clearTimeout(_uploadStatusTimer);
  if(state !== 'loading'){
    _uploadStatusTimer = setTimeout(()=>{ el.classList.remove('show'); }, 3000);
  }
}
function hideUploadStatus(){
  document.getElementById('upload-status').classList.remove('show');
}

/* ══════════════════════════════════════
   IMAGE UPLOAD TO GITHUB
   图片推送到 images/ 文件夹，返回可访问 URL
══════════════════════════════════════ */
async function uploadImageToGH(file){
  // Read file as base64
  const base64 = await new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>res(e.target.result.split(',')[1]); // strip data:...;base64, prefix
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });

  // Build a unique filename
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const fname='images/'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+'.'+ext;
  const apiUrl=`https://api.github.com/repos/${GH.user}/${GH.repo}/contents/${fname}`;
  const headers={
    'Authorization':`token ${GH.token}`,
    'Content-Type':'application/json',
    'Accept':'application/vnd.github.v3+json'
  };

  const res=await fetch(apiUrl,{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'upload image: '+fname,
      content:base64
    })
  });

  if(!res.ok){
    const d=await res.json().catch(()=>({}));
    if(res.status===401) throw new Error('GitHub Token 无效');
    if(res.status===403) throw new Error('Token 权限不足，请勾选 repo');
    if(res.status===422) throw new Error('文件已存在');
    throw new Error(d.message||'HTTP '+res.status);
  }

  // Return the raw GitHub Pages URL
  const data=await res.json();
  // Use jsdelivr CDN for faster loading in China
  const rawUrl=`https://cdn.jsdelivr.net/gh/${GH.user}/${GH.repo}@main/${fname}`;
  return rawUrl;
}

/* ══════════════════════════════════════
   CHANGE PASSWORD
══════════════════════════════════════ */
function openCpwModal(){
  ['cpw-old','cpw-new','cpw-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cpw-err').textContent='';
  document.getElementById('cpw-modal').classList.add('show');
  setTimeout(()=>document.getElementById('cpw-old').focus(),80);
}
function closeCpwModal(){
  document.getElementById('cpw-modal').classList.remove('show');
}
async function submitCpw(){
  const oldVal=document.getElementById('cpw-old').value;
  const newVal=document.getElementById('cpw-new').value;
  const cfmVal=document.getElementById('cpw-confirm').value;
  const errEl=document.getElementById('cpw-err');
  errEl.textContent='';
  if(!oldVal||!newVal||!cfmVal){errEl.textContent='// 请填写所有字段';return;}
  if(newVal.length<6){errEl.textContent='// 新密码至少需要 6 位';return;}
  if(newVal!==cfmVal){errEl.textContent='// 两次输入的密码不一致';return;}
  const oldHash=await sha256(oldVal);
  if(oldHash!==PW_HASH){errEl.textContent='// 当前密码错误';return;}
  // Re-encrypt token with new password before updating key
  const oldKey = __aesKey;
  const newKey = await deriveKey(newVal);
  if (oldKey && localStorage.getItem('gh_token_enc')) {
    const token = await decryptToken();
    if (token) { __aesKey = newKey; await encryptToken(token); }
    else { __aesKey = newKey; }
  } else {
    __aesKey = newKey;
  }
  PW_HASH=await sha256(newVal);
  closeCpwModal();
  showToast('ok','密码已修改 · 请重新推送 admin.html 使其永久生效 ✓');
}
</script>
