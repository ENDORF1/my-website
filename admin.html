<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>_DEV.LOG · 后台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030810;--dim:#0a1628;--panel:#0d1f35;--border:rgba(0,245,255,.15);
  --cyan:#00f5ff;--magenta:#ff006e;--yellow:#ffe600;--green:#00ff9d;
  --text:#c8e0f0;--muted:#3a5a7a;--white:#fff;
  --glow-c:0 0 8px #00f5ff66,0 0 24px #00f5ff33;
  --font-mono:'Share Tech Mono',monospace;
  --font-body:'Noto Sans SC',sans-serif;
  --font-code:'Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);cursor:auto;}

/* ── LOCK SCREEN ── */
#lock{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;}
#lock-box{background:var(--dim);border:1px solid var(--border);padding:48px 56px;width:400px;max-width:92vw;position:relative;}
#lock-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.lk-tag{font-family:var(--font-mono);font-size:10px;color:var(--magenta);letter-spacing:4px;margin-bottom:16px;display:block;}
.lk-title{font-size:22px;font-weight:700;color:var(--white);letter-spacing:2px;margin-bottom:6px;}
.lk-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:28px;line-height:1.7;}
.lk-input{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.15);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:18px;letter-spacing:6px;padding:12px 16px;outline:none;margin-bottom:8px;}
.lk-err{font-family:var(--font-mono);font-size:10px;color:var(--magenta);letter-spacing:2px;min-height:20px;margin-bottom:12px;display:block;}
.lk-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color .3s;}
.lk-btn::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.lk-btn:hover{color:var(--bg);}
.lk-btn:hover::before{transform:translateX(0);}
@keyframes lkShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* ── CHANGE PASSWORD MODAL ── */
#cpw-modal{position:fixed;inset:0;z-index:9003;background:rgba(3,8,16,.94);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;}
#cpw-modal.show{display:flex;}
#cpw-box{background:var(--dim);border:1px solid var(--border);padding:40px 48px;width:400px;max-width:92vw;position:relative;}
#cpw-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));}
/* ── UPLOAD STATUS ── */
#upload-status{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  z-index:99998;
  background:rgba(4,10,20,.97);
  border:1px solid var(--border);
  padding:12px 24px;
  display:none;align-items:center;gap:12px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:2px;
  min-width:260px;
}
#upload-status.show{display:flex;}
#upload-status.state-loading{border-color:rgba(255,230,0,.3);}
#upload-status.state-ok{border-color:rgba(0,255,157,.3);}
#upload-status.state-err{border-color:rgba(255,0,110,.3);}
.us-spinner{width:14px;height:14px;border:2px solid rgba(255,230,0,.2);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.us-msg{flex:1;}
#upload-status.state-loading .us-msg{color:var(--yellow);}
#upload-status.state-ok .us-msg{color:var(--green);}
#upload-status.state-err .us-msg{color:var(--magenta);}
/* ── TOAST ── */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:99999;font-family:var(--font-mono);font-size:12px;letter-spacing:2px;padding:12px 28px;border:1px solid;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{color:var(--green);border-color:rgba(0,255,157,.35);background:rgba(0,255,157,.08);}
#toast.err{color:var(--magenta);border-color:rgba(255,0,110,.35);background:rgba(255,0,110,.08);}
#toast.info{color:var(--cyan);border-color:rgba(0,245,255,.35);background:rgba(0,245,255,.08);}

/* ── LAYOUT ── */
#app{display:none;height:100vh;flex-direction:column;}
#app.show{display:flex;}

/* top bar */
#topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:52px;background:rgba(4,10,20,.97);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.tb-logo{font-family:var(--font-mono);font-size:14px;color:var(--cyan);letter-spacing:3px;text-shadow:var(--glow-c);white-space:nowrap;}
.tb-logo span{color:var(--magenta);}
.tb-sep{width:1px;height:20px;background:var(--border);}
.tb-nav{display:flex;gap:4px;}
.tb-nav-btn{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:5px 12px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.tb-nav-btn:hover,.tb-nav-btn.active{color:var(--cyan);border-color:rgba(0,245,255,.25);}
.tb-spacer{flex:1;}
.tb-status{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;padding:4px 12px;border:1px solid;}
.tb-status.idle{color:var(--muted);border-color:rgba(255,255,255,.08);}
.tb-status.pushing{color:var(--yellow);border-color:rgba(255,230,0,.3);animation:blink .8s infinite;}
.tb-status.ok{color:var(--green);border-color:rgba(0,255,157,.3);}
.tb-status.err{color:var(--magenta);border-color:rgba(255,0,110,.3);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.tb-btn{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:6px 16px;border:1px solid;background:transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.tb-btn-pub{border-color:var(--cyan);color:var(--cyan);}
.tb-btn-pub:hover{background:var(--cyan);color:var(--bg);}
.tb-btn-new{border-color:rgba(0,245,255,.3);color:var(--muted);}
.tb-btn-new:hover{border-color:var(--cyan);color:var(--cyan);}
.tb-btn-del{border-color:rgba(255,0,110,.3);color:var(--magenta);}
.tb-btn-del:hover{background:rgba(255,0,110,.15);}

/* ── PANELS ── */
#panels{display:flex;flex:1;overflow:hidden;}

/* left: post list */
#post-list-panel{width:280px;flex-shrink:0;background:var(--dim);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#post-list-panel.hidden{display:none;}
.pl-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pl-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:3px;}
.pl-new{font-family:var(--font-mono);font-size:18px;color:var(--muted);cursor:pointer;line-height:1;transition:color .2s;background:none;border:none;}
.pl-new:hover{color:var(--cyan);}
#post-list{flex:1;overflow-y:auto;padding:8px 0;}
#post-list::-webkit-scrollbar{width:4px;}
#post-list::-webkit-scrollbar-track{background:transparent;}
#post-list::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
.post-item{padding:12px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .2s;position:relative;display:flex;align-items:center;}
.post-item:hover{background:rgba(0,245,255,.04);border-left-color:rgba(0,245,255,.3);}
.post-item.active{background:rgba(0,245,255,.06);border-left-color:var(--cyan);}
.pi-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.post-item.active .pi-title{color:var(--white);}
.pi-meta{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;display:flex;gap:8px;}
.pi-cat{color:var(--magenta);}
.pi-draft{position:absolute;right:12px;top:12px;font-family:var(--font-mono);font-size:9px;color:var(--yellow);letter-spacing:1px;border:1px solid rgba(255,230,0,.3);padding:1px 5px;}

/* right: editor */
#editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#editor-panel.hidden{display:none;}

/* meta bar */
#meta-bar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
#post-title-input{background:transparent;border:none;border-bottom:1px solid rgba(0,245,255,.15);color:var(--white);font-size:22px;font-weight:700;letter-spacing:1px;padding:6px 0;outline:none;width:100%;font-family:var(--font-body);transition:border-color .2s;}
#post-title-input:focus{border-bottom-color:var(--cyan);}
#post-title-input::placeholder{color:var(--muted);}
.meta-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.meta-input{background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.12);color:var(--text);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;padding:5px 10px;outline:none;transition:border-color .2s;}
.meta-input:focus{border-color:var(--cyan);}
.meta-input::placeholder{color:var(--muted);}
.meta-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;}
#cover-upload-btn{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;border:1px dashed rgba(0,245,255,.2);padding:5px 12px;cursor:pointer;transition:all .2s;background:transparent;}
#cover-upload-btn:hover{border-color:var(--cyan);color:var(--cyan);}
#cover-preview{height:32px;width:56px;object-fit:cover;border:1px solid var(--border);display:none;}

/* toolbar */
#editor-toolbar{display:flex;gap:2px;padding:8px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;background:rgba(4,10,20,.5);}
.et-btn{font-family:var(--font-mono);font-size:12px;padding:4px 10px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;min-width:32px;text-align:center;}
.et-btn:hover{color:var(--cyan);border-color:rgba(0,245,255,.2);}
.et-btn.active{color:var(--cyan);border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.05);}
.et-sep{width:1px;height:24px;background:var(--border);margin:0 4px;align-self:center;}

/* editor body */
#editor-wrap{flex:1;display:flex;overflow:hidden;}
#editor-content{flex:1;padding:32px 48px;outline:none;overflow-y:auto;font-size:15px;line-height:1.9;color:var(--text);font-family:var(--font-body);}
#editor-content::-webkit-scrollbar{width:6px;}
#editor-content::-webkit-scrollbar-track{background:transparent;}
#editor-content::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px;}
#editor-content:empty::before{content:'开始写作...';color:var(--muted);pointer-events:none;}
#editor-content h1{font-size:28px;font-weight:700;color:var(--white);margin:32px 0 16px;padding-left:16px;border-left:4px solid var(--cyan);}
#editor-content h2{font-size:22px;font-weight:700;color:var(--white);margin:28px 0 12px;padding-left:12px;border-left:3px solid var(--magenta);}
#editor-content h3{font-size:18px;font-weight:700;color:var(--white);margin:24px 0 10px;padding-left:10px;border-left:2px solid var(--yellow);}
#editor-content p{margin:0 0 12px;color:var(--text);}
#editor-content strong{color:var(--white);font-weight:700;}
#editor-content em{color:var(--cyan);font-style:italic;}
#editor-content ul,#editor-content ol{margin:8px 0 16px 24px;}
#editor-content li{margin-bottom:6px;color:var(--text);}
#editor-content a{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,245,255,.3);}
#editor-content blockquote{border-left:3px solid var(--cyan);padding:12px 20px;margin:16px 0;background:rgba(0,245,255,.04);color:var(--muted);}
#editor-content hr{border:none;border-top:1px solid var(--border);margin:32px 0;}
#editor-content img{max-width:100%;border:1px solid var(--border);margin:8px 0;}

/* image centering in editors */
#editor-content img{max-width:100%;border:1px solid var(--border);margin:12px auto;display:block;}
#editor-content figure.post-figure{margin:16px 0;text-align:center;}
#editor-content figure.post-figure img{margin:0 auto;}
#editor-content figure.post-figure figcaption{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:6px;}
/* table in editor */
#editor-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px;}
#editor-content .table-wrap{display:block;width:100%;overflow-x:auto;}
#editor-content table td,#editor-content table th{border:1px solid rgba(0,245,255,.25);padding:8px 12px;color:var(--text);}
#editor-content table th{background:rgba(0,245,255,.06);color:var(--white);font-weight:600;}
#editor-content table tr:hover td{background:rgba(0,245,255,.03);}
/* code blocks in editor */
#editor-content pre{background:#0a0e1a;border:1px solid rgba(0,245,255,.15);border-radius:0;margin:16px 0;overflow:hidden;position:relative;}
#editor-content pre .code-lang{position:absolute;top:0;right:0;font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;padding:6px 12px;background:rgba(0,245,255,.05);border-bottom:1px solid rgba(0,245,255,.1);border-left:1px solid rgba(0,245,255,.1);}
#editor-content pre code{display:block;padding:16px 20px;font-family:var(--font-code);font-size:13px;line-height:1.7;color:#a8c8e8;overflow-x:auto;counter-reset:line;}
#editor-content pre code .line{display:block;position:relative;padding-left:40px;}
#editor-content pre code .line::before{content:counter(line);counter-increment:line;position:absolute;left:0;width:30px;text-align:right;color:var(--muted);user-select:none;font-size:11px;}

/* insert code modal */
#code-modal{position:fixed;inset:0;z-index:9000;background:rgba(3,8,16,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
#code-modal.show{display:flex;}
#code-box{background:var(--dim);border:1px solid var(--border);width:660px;max-width:95vw;position:relative;}
#code-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.cb-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.cb-title{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:3px;}
.cb-close{font-family:var(--font-mono);font-size:16px;color:var(--muted);cursor:pointer;background:none;border:none;transition:color .2s;}
.cb-close:hover{color:var(--magenta);}
.cb-body{padding:20px;}
.cb-lang{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.15);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:12px;letter-spacing:2px;padding:8px 12px;outline:none;margin-bottom:12px;}
.cb-code{width:100%;height:200px;background:#0a0e1a;border:1px solid rgba(0,245,255,.15);color:#a8c8e8;font-family:var(--font-code);font-size:13px;line-height:1.7;padding:14px 16px;outline:none;resize:vertical;tab-size:2;}
.cb-insert{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:12px;position:relative;overflow:hidden;transition:color .3s;}
.cb-insert::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.cb-insert:hover{color:var(--bg);}
.cb-insert:hover::before{transform:translateX(0);}

/* gh config modal */
#gh-modal{position:fixed;inset:0;z-index:99990;background:rgba(3,8,16,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
#gh-modal.show{display:flex;}
#gh-box{background:var(--dim);border:1px solid var(--border);width:420px;max-width:92vw;position:relative;padding:40px 48px;}
#gh-box::before{pointer-events:none;}
#gh-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.gh-field{margin-bottom:14px;}
.gh-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:6px;}
.gh-input{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.12);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:13px;letter-spacing:2px;padding:10px 12px;outline:none;}
.gh-save{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;position:relative;overflow:hidden;transition:color .3s;}
.gh-save::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.gh-save:hover{color:var(--bg);}
.gh-save:hover::before{transform:translateX(0);}
.gh-cancel{width:100%;padding:8px;background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:8px;transition:color .2s;text-transform:uppercase;}
.gh-cancel:hover{color:var(--magenta);}

/* push log */
#push-log{position:fixed;bottom:24px;right:24px;z-index:8000;width:320px;background:rgba(4,10,20,.97);border:1px solid var(--border);display:none;flex-direction:column;max-height:200px;}
#push-log.show{display:flex;}
.pl-log-header{padding:8px 14px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;display:flex;justify-content:space-between;align-items:center;}
.pl-log-close{cursor:pointer;color:var(--muted);transition:color .2s;background:none;border:none;font-size:14px;}
.pl-log-close:hover{color:var(--magenta);}
#push-log-body{padding:10px 14px;overflow-y:auto;flex:1;font-family:var(--font-mono);font-size:11px;line-height:2;letter-spacing:1px;}
.pl-info{color:var(--muted);}
.pl-ok{color:var(--green);}
.pl-err{color:var(--magenta);}
.pl-spin{color:var(--yellow);}

/* works editor panel */
#works-list-panel{width:280px;flex-shrink:0;background:var(--dim);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#works-list-panel.hidden{display:none;}
#works-list{flex:1;overflow-y:auto;padding:8px 0;}
#works-list::-webkit-scrollbar{width:4px;}
#works-list::-webkit-scrollbar-track{background:transparent;}
#works-list::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
.wi-item{padding:12px 16px;cursor:pointer;border-left:2px solid transparent;position:relative;transition:background .15s;display:flex;align-items:center;}
.wi-item:hover{background:rgba(0,245,255,.04);}
.wi-item.active{background:rgba(0,245,255,.06);border-left-color:var(--cyan);}
.wi-title{font-size:13px;color:var(--white);margin-bottom:4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wi-meta{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;}
.wi-draft{position:absolute;right:12px;top:12px;font-family:var(--font-mono);font-size:9px;color:var(--yellow);letter-spacing:1px;border:1px solid rgba(255,230,0,.3);padding:1px 5px;}
#works-editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#works-editor-panel.hidden{display:none;}
#works-meta-bar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
#works-title-input{background:transparent;border:none;border-bottom:1px solid rgba(0,245,255,.15);color:var(--white);font-size:22px;font-weight:700;letter-spacing:1px;padding:6px 0;outline:none;width:100%;font-family:var(--font-body);transition:border-color .2s;}
#works-title-input:focus{border-bottom-color:var(--cyan);}
#works-title-input::placeholder{color:var(--muted);}
#works-editor-toolbar{display:flex;gap:2px;padding:8px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;background:rgba(4,10,20,.5);}
#works-editor-wrap{flex:1;display:flex;overflow:hidden;}
#works-editor-content{flex:1;padding:32px 48px;outline:none;overflow-y:auto;font-size:15px;line-height:1.9;color:var(--text);font-family:var(--font-body);}
#works-editor-content::-webkit-scrollbar{width:6px;}
#works-editor-content::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px;}
#works-editor-content:empty::before{content:'开始写项目介绍...';color:var(--muted);pointer-events:none;}
#works-editor-content h2{font-size:22px;font-weight:700;color:var(--white);margin:28px 0 12px;padding-left:12px;border-left:3px solid var(--magenta);}
#works-editor-content h3{font-size:18px;font-weight:700;color:var(--white);margin:24px 0 10px;padding-left:10px;border-left:2px solid var(--yellow);}
#works-editor-content p{margin:0 0 12px;color:var(--text);}
#works-editor-content strong{color:var(--white);font-weight:700;}
#works-editor-content em{color:var(--cyan);font-style:italic;}
#works-editor-content ul,#works-editor-content ol{margin:8px 0 16px 24px;}
#works-editor-content li{margin-bottom:6px;color:var(--text);}
#works-editor-content a{color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,245,255,.3);}
#works-editor-content blockquote{border-left:3px solid var(--cyan);padding:12px 20px;margin:16px 0;background:rgba(0,245,255,.04);color:var(--muted);}
#works-editor-content hr{border:none;border-top:1px solid var(--border);margin:32px 0;}
#works-editor-content img{max-width:100%;border:1px solid var(--border);margin:8px 0;}
#works-editor-content img{max-width:100%;border:1px solid var(--border);margin:12px auto;display:block;}
#works-editor-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px;}
#works-editor-content .table-wrap{display:block;width:100%;overflow-x:auto;}
#works-editor-content table td,#works-editor-content table th{border:1px solid rgba(0,245,255,.25);padding:8px 12px;color:var(--text);}
#works-editor-content table th{background:rgba(0,245,255,.06);color:var(--white);font-weight:600;}
#works-editor-content pre{background:#0a0e1a;border:1px solid rgba(0,245,255,.15);margin:16px 0;overflow:hidden;position:relative;}
#works-editor-content pre code{display:block;padding:16px 20px;font-family:var(--font-code);font-size:13px;line-height:1.7;color:#a8c8e8;overflow-x:auto;}
#works-editor-content .video-embed{position:relative;width:100%;padding-bottom:56.25%;margin:24px 0;background:#000;}
#works-editor-content .video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}

/* enhanced toolbar elements */
.et-select{font-family:var(--font-mono);font-size:11px;background:transparent;border:1px solid transparent;color:var(--muted);cursor:pointer;padding:3px 6px;outline:none;transition:all .2s;letter-spacing:1px;height:28px;}
.et-select:hover,.et-select:focus{color:var(--cyan);border-color:rgba(0,245,255,.2);}
.et-select option{background:var(--dim);color:var(--text);}
.et-color-wrap{position:relative;display:inline-flex;align-items:center;}
.et-color-swatch{width:12px;height:3px;position:absolute;bottom:3px;left:50%;transform:translateX(-50%);pointer-events:none;border-radius:1px;}
.et-hidden-input{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
.et-word-count{font-family:var(--font-mono);font-size:10px;color:var(--muted);padding:4px 8px;letter-spacing:1px;align-self:center;white-space:nowrap;}

/* fullscreen editor */
.editor-fullscreen{position:fixed!important;inset:0!important;z-index:9500!important;background:var(--bg)!important;display:flex!important;flex-direction:column!important;}
.editor-fullscreen #editor-toolbar,.editor-fullscreen #works-editor-toolbar{flex-shrink:0;}
.editor-fullscreen #editor-content,.editor-fullscreen #works-editor-content{flex:1;max-width:800px;margin:0 auto;width:100%;}

/* find & replace modal */
#find-modal{position:fixed;inset:0;z-index:9100;background:rgba(3,8,16,.88);backdrop-filter:blur(14px);display:none;align-items:flex-start;justify-content:center;padding-top:80px;}
#find-modal.show{display:flex;}
#find-box{background:var(--dim);border:1px solid var(--border);width:480px;max-width:94vw;position:relative;}
#find-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.fb-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
.fb-title{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:3px;}
.fb-body{padding:20px;}
.fb-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.fb-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;width:40px;flex-shrink:0;}
.fb-input{flex:1;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.15);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:13px;padding:7px 10px;outline:none;letter-spacing:1px;}
.fb-actions{display:flex;gap:8px;margin-top:14px;}
.fb-btn{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:6px 16px;border:1px solid;background:transparent;cursor:pointer;text-transform:uppercase;transition:all .2s;}
.fb-btn-find{border-color:var(--cyan);color:var(--cyan);}
.fb-btn-find:hover{background:var(--cyan);color:var(--bg);}
.fb-btn-rep{border-color:rgba(0,245,255,.4);color:var(--muted);}
.fb-btn-rep:hover{border-color:var(--cyan);color:var(--cyan);}
.fb-btn-all{border-color:rgba(255,230,0,.4);color:var(--yellow);}
.fb-btn-all:hover{background:rgba(255,230,0,.1);}
.fb-stat{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;min-height:20px;margin-top:8px;}

/* table insert modal */
#table-modal{position:fixed;inset:0;z-index:9100;background:rgba(3,8,16,.88);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;}
#table-modal.show{display:flex;}
#table-box{background:var(--dim);border:1px solid var(--border);padding:36px 44px;width:320px;max-width:94vw;position:relative;}
#table-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}


.img-mgr-btn{font-family:var(--font-mono);font-size:10px;padding:4px 12px;border:1px solid rgba(0,245,255,.25);color:var(--muted);background:transparent;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.img-mgr-btn:hover{color:var(--cyan);border-color:var(--cyan);}
.img-del-btn{border-color:rgba(255,0,110,.3)!important;color:var(--magenta)!important;display:none;}
.img-del-btn:hover{background:rgba(255,0,110,.15)!important;color:var(--magenta)!important;border-color:rgba(255,0,110,.5)!important;}
/* works / gallery / about panels */
#page-panel{flex:1;display:none;flex-direction:column;overflow:hidden;}
#page-panel.show{display:flex;}
.pp-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.pp-title{font-family:var(--font-mono);font-size:13px;color:var(--cyan);letter-spacing:3px;}
.pp-hint{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;}
.pp-body{flex:1;overflow-y:auto;padding:32px;}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.pp-card{background:var(--dim);border:1px solid var(--border);padding:20px;position:relative;cursor:pointer;transition:border-color .2s;}
.pp-card:hover{border-color:rgba(0,245,255,.3);}
.pp-card-img{width:100%;height:140px;object-fit:cover;border:1px solid var(--border);margin-bottom:12px;display:block;background:rgba(0,245,255,.04);}
.pp-card-img-placeholder{width:100%;height:140px;background:rgba(0,245,255,.04);border:1px dashed rgba(0,245,255,.15);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;}
.pp-card-img-placeholder:hover{border-color:var(--cyan);color:var(--cyan);}
.pp-card-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px;}
.pp-card-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.pp-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.pp-tag{font-family:var(--font-mono);font-size:10px;color:var(--cyan);border:1px solid rgba(0,245,255,.25);padding:2px 8px;letter-spacing:1px;}
.pp-card-del{position:absolute;top:10px;right:10px;background:rgba(255,0,110,.12);border:1px solid rgba(255,0,110,.3);color:var(--magenta);font-family:var(--font-mono);font-size:10px;padding:2px 7px;cursor:pointer;opacity:0;transition:opacity .2s;}
.pp-card:hover .pp-card-del{opacity:1;}
.pp-add{background:transparent;border:1px dashed rgba(0,245,255,.18);display:flex;align-items:center;justify-content:center;height:200px;cursor:pointer;color:var(--muted);font-family:var(--font-mono);font-size:13px;letter-spacing:2px;transition:all .2s;}
.pp-add:hover{border-color:var(--cyan);color:var(--cyan);}

/* about editor */
#about-editor{flex:1;padding:32px 48px;outline:none;overflow-y:auto;font-size:15px;line-height:1.9;color:var(--text);}
#about-editor h1{font-size:28px;font-weight:700;color:var(--white);margin:0 0 16px;padding-left:16px;border-left:4px solid var(--cyan);}
#about-editor p{margin:0 0 12px;}
#about-editor strong{color:var(--white);font-weight:700;}

/* image upload input (hidden) */
#img-file-input,#cover-file-input,#pp-img-input{display:none;}

/* card edit modal */
.ed-btn{font-family:var(--font-mono);font-size:10px;padding:4px 8px;background:transparent;border:1px solid rgba(0,245,255,.2);color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:1px;}
.ed-btn:hover{border-color:var(--cyan);color:var(--cyan);}
#works-editor-content h2{font-size:20px;font-weight:700;color:#fff;margin:24px 0 10px;padding-left:12px;border-left:3px solid var(--magenta);}
#works-editor-content h3{font-size:16px;font-weight:700;color:#fff;margin:18px 0 8px;padding-left:10px;border-left:2px solid var(--cyan);}
#works-editor-content p{margin:0 0 12px;}
#works-editor-content pre{background:#060d18;border:1px solid rgba(0,245,255,.15);padding:14px 16px;font-family:var(--font-code);font-size:13px;color:#a8c8e8;overflow-x:auto;margin:12px 0;white-space:pre-wrap;}
#works-editor-content img{max-width:100%;border:1px solid rgba(0,245,255,.15);margin:8px 0;display:block;}
#works-editor-content .video-embed{position:relative;width:100%;padding-bottom:56.25%;margin:16px 0;background:#000;}
#works-editor-content .video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
#card-modal{position:fixed;inset:0;z-index:99999;background:rgba(3,8,16,.92);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;}
#card-modal.show{display:flex;}
#card-box{background:var(--dim);border:1px solid var(--border);width:520px;max-width:92vw;position:relative;padding:40px 44px;}
#card-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));pointer-events:none;}
.card-field{margin-bottom:14px;}
.card-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;display:block;margin-bottom:6px;}
.card-input,.card-textarea{width:100%;background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.12);border-bottom:1px solid var(--cyan);color:var(--white);font-family:var(--font-mono);font-size:13px;letter-spacing:1px;padding:8px 12px;outline:none;font-family:var(--font-body);}
.card-textarea{height:80px;resize:vertical;font-size:13px;}
.card-img-preview{width:100%;height:100px;object-fit:cover;border:1px solid var(--border);margin-bottom:8px;display:none;}
.focus-picker-wrap{position:relative;display:none;margin-bottom:8px;}
.focus-picker-wrap.show{display:block;}
.focus-picker-img{width:100%;height:180px;object-fit:cover;display:block;border:1px solid var(--border);cursor:crosshair;}
.focus-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--cyan);border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 8px rgba(0,245,255,.8);transition:left .1s,top .1s;}
.focus-hint{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;display:none;}
.focus-picker-wrap.show + .focus-hint{display:block;}
.card-img-upload{width:100%;padding:8px;background:transparent;border:1px dashed rgba(0,245,255,.2);color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-align:center;}
.card-img-upload:hover{border-color:var(--cyan);color:var(--cyan);}
.card-save{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:var(--font-mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;position:relative;overflow:hidden;transition:color .3s;}
.card-save::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s;}
.card-save:hover{color:var(--bg);}
.card-save:hover::before{transform:translateX(0);}
.card-cancel{width:100%;padding:8px;background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;cursor:pointer;margin-top:6px;transition:color .2s;text-transform:uppercase;}
.card-cancel:hover{color:var(--magenta);}
</style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock">
  <div id="lock-box">
    <span class="lk-tag">// ADMIN ACCESS</span>
    <div class="lk-title">后台管理</div>
    <div class="lk-sub">请输入管理密码继续</div>
    <input id="lk-input" class="lk-input" type="password" placeholder="••••••••" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <span class="lk-err" id="lk-err"></span>
    <button class="lk-btn" onclick="doLogin()">进入后台</button>
  </div>
</div>

<div id="toast"></div>
<div id="upload-status">
  <div class="us-spinner" id="us-spinner"></div>
  <span class="us-msg" id="us-msg"></span>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- topbar -->
  <div id="topbar">
    <div class="tb-logo">_<span>DEV</span>.ADMIN</div>
    <div class="tb-sep"></div>
    <div class="tb-nav">
      <button class="tb-nav-btn active" onclick="switchTab('blog',this)">博客</button>
      <button class="tb-nav-btn" onclick="switchTab('works',this)">游戏项目</button>
      <button class="tb-nav-btn" onclick="switchTab('gallery',this)">同人画廊</button>
      <button class="tb-nav-btn" onclick="switchTab('about',this)">关于我</button>
      <button class="tb-nav-btn" onclick="switchTab('images',this)">🖼 图片管理</button>
    </div>
    <div class="tb-spacer"></div>
    <div class="tb-status idle" id="tb-status">// 就绪</div>
    <button class="tb-btn tb-btn-new" onclick="openGhConfig()">⚙ GitHub</button>
    <button class="tb-btn" style="border-color:rgba(255,0,110,.25);color:rgba(255,0,110,.6);font-size:10px;" onclick="openCpwModal()">🔑 改密码</button>
    <button class="tb-btn tb-btn-pub" onclick="publishCurrent()" id="pub-btn">⬆ 发布</button>
  </div>

  <!-- panels -->
  <div id="panels">

    <!-- post list -->
    <!-- works list panel -->
    <div id="works-list-panel" class="hidden">
      <div class="pl-header">
        <span class="pl-title">// 游戏项目</span>
        <button class="pl-new" onclick="newWork()" title="新建项目">＋</button>
      </div>
      <div id="works-list"></div>
    </div>

    <!-- works editor panel -->
    <div id="works-editor-panel" class="hidden">
      <div id="works-meta-bar">
        <input id="works-title-input" type="text" placeholder="项目标题...">
        <div class="meta-row">
          <span class="meta-label">标签</span>
          <input class="meta-input" id="works-tags" placeholder="如：IN PROGRESS, ROGUELIKE, CARD GAME" style="width:260px">
          <span class="meta-label">日期</span>
          <input class="meta-input" id="works-date" type="date" style="width:140px">
          <span class="meta-label">状态</span>
          <select class="meta-input" id="works-status" style="width:100px;background:transparent;color:var(--text);">
            <option value="draft">草稿</option>
            <option value="published">已发布</option>
          </select>
          <span class="meta-label">外链</span>
          <input class="meta-input" id="works-link" placeholder="https://..." style="width:200px">
          <button id="works-cover-btn" onclick="document.getElementById('works-cover-input').click()">📷 封面图</button>
          <img id="works-cover-preview" src="" alt="封面" style="display:none;height:36px;width:60px;object-fit:cover;border:1px solid var(--border);cursor:pointer;" onclick="document.getElementById('works-cover-input').click()">
          <input type="file" id="works-cover-input" accept="image/*" style="display:none" onchange="handleWorksCover(this)">
        </div>
        <!-- 排版设置行 -->
        <div class="meta-row" style="padding:8px 0 2px;border-top:1px solid rgba(0,245,255,.08);gap:14px;flex-wrap:wrap;">
          <span class="meta-label" style="color:rgba(0,245,255,.55);letter-spacing:2px;">⊟ 排版</span>
          <label class="meta-label" style="display:flex;align-items:center;gap:5px;">正文宽度
            <input class="meta-input" id="works-layout-width" type="text" placeholder="如：720px" value="720px" style="width:100px;">
          </label>
          <label class="meta-label" style="display:flex;align-items:center;gap:5px;">行距
            <input class="meta-input" id="works-layout-lh" type="text" placeholder="如：1.9" value="1.9" style="width:90px;">
          </label>
          <label class="meta-label" style="display:flex;align-items:center;gap:5px;">正文字号
            <input class="meta-input" id="works-layout-fontsize" type="text" placeholder="如：15px" value="15px" style="width:90px;">
          </label>
          <label class="meta-label" style="display:flex;align-items:center;gap:5px;">代码字号
            <input class="meta-input" id="works-layout-code-size" type="text" placeholder="如：13px" value="13px" style="width:90px;">
          </label>
          <label class="meta-label" style="display:flex;align-items:center;gap:5px;">段落间距
            <input class="meta-input" id="works-layout-pgap" type="text" placeholder="如：16px" value="16px" style="width:90px;">
          </label>
        </div>
      </div>
      <div id="works-editor-toolbar">
        <button class="et-btn" onclick="wfmt('h2')">H2</button>
        <button class="et-btn" onclick="wfmt('h3')">H3</button>
        <div class="et-sep"></div>
        <button class="et-btn" onclick="wexec('bold')"><b>B</b></button>
        <button class="et-btn" onclick="wexec('italic')"><i>I</i></button>
        <button class="et-btn" onclick="wexec('underline')"><u>U</u></button>
        <button class="et-btn" onclick="wexec('strikeThrough')"><s>S</s></button>
        <button class="et-btn" onclick="wexec('superscript')" style="font-size:10px;">x²</button>
        <button class="et-btn" onclick="wexec('subscript')" style="font-size:10px;">x₂</button>
        <div class="et-sep"></div>
        <button class="et-btn" onclick="wexec('justifyLeft')" title="左对齐">⬤L</button>
        <button class="et-btn" onclick="wexec('justifyCenter')" title="居中">⬤C</button>
        <button class="et-btn" onclick="wexec('justifyRight')" title="右对齐">⬤R</button>
        <div class="et-sep"></div>
        <select class="et-select" onchange="applyFontSize(this,'works-editor-content')" title="字号">
          <option value="">字号</option>
          <option value="12px">小 · 12</option>
          <option value="15px">正常 · 15</option>
          <option value="18px">中 · 18</option>
          <option value="22px">大 · 22</option>
          <option value="28px">特大 · 28</option>
        </select>
        <div class="et-color-wrap" title="文字颜色">
          <button class="et-btn" onclick="document.getElementById('works-text-color').click()" style="font-weight:700;position:relative;padding-bottom:8px;">A<span class="et-color-swatch" id="works-text-swatch" style="background:#00f5ff;"></span></button>
          <input type="color" id="works-text-color" class="et-hidden-input" value="#00f5ff" oninput="applyTextColor(this.value,'works-editor-content','works-text-swatch')">
        </div>
        <div class="et-color-wrap" title="高亮颜色">
          <button class="et-btn" onclick="document.getElementById('works-hl-color').click()" style="position:relative;padding-bottom:8px;">H<span class="et-color-swatch" id="works-hl-swatch" style="background:#ffe600;"></span></button>
          <input type="color" id="works-hl-color" class="et-hidden-input" value="#ffe600" oninput="applyHighlight(this.value,'works-editor-content','works-hl-swatch')">
        </div>
        <div class="et-sep"></div>
        <button class="et-btn" onclick="wfmt('ul')">• 列表</button>
        <button class="et-btn" onclick="wfmt('ol')">1. 列表</button>
        <button class="et-btn" onclick="wfmt('blockquote')">❝ 引用</button>
        <button class="et-btn" onclick="wfmt('hr')">— 分割线</button>
        <button class="et-btn" onclick="wexec('indent')" title="增加缩进">→|</button>

// 优先读取 localStorage 中的密码哈希（与 index.html 共享）
// 若不存在则使用初始默认哈希（对应密码 admin888）
let PW_HASH = localStorage.getItem('_pw_hash') || 'aaffebecec560fec66e75f24062224ffa4e07696d2ae9a1fee3707c3f8fd9373';
// 确保 localStorage 始终有值（首次初始化）
if(!localStorage.getItem('_pw_hash')) localStorage.setItem('_pw_hash', PW_HASH);

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const val=document.getElementById('lk-input').value;
  const hash=await sha256(val);
  if(hash===PW_HASH){
    __aesKey = await deriveKey(val); // derive encryption key from password
    document.getElementById('lock').remove();
    document.getElementById('app').classList.add('show');
    init();
  } else {
    const err=document.getElementById('lk-err');
    err.textContent='// 密码错误';
    const inp=document.getElementById('lk-input');
    inp.value='';
    inp.style.animation='lkShake .35s ease';
    setTimeout(()=>inp.style.animation='',400);
  }
}
document.getElementById('lk-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* ══════════════════════════════════════

══════════════════════════════════════ */

]));

/* ══════════════════════════════════════
   DRAG-TO-REORDER (mouse-based, vertical list & grid)
══════════════════════════════════════ */
function makeDragList(container, itemSel, onReorder){
  let dragging=null, ghost=null, offY=0, offX=0;

  function siblings(){ return [...container.querySelectorAll(itemSel)]; }

  function mkGhost(el){
    const r=el.getBoundingClientRect();
    const g=el.cloneNode(true);
    g.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;'
      +'height:'+r.height+'px;opacity:.55;pointer-events:none;z-index:99999;'
      +'box-shadow:0 4px 20px rgba(0,0,0,.5);outline:1px solid var(--cyan);';
    document.body.appendChild(g);
    return g;
  }

  container.addEventListener('mousedown', e=>{
    const handle = e.target.closest('[data-drag-handle]') || e.target.closest(itemSel);
    if(!handle) return;
    const el = e.target.closest(itemSel);
    if(!el || el.closest('.pp-add')) return;
    // don't drag if clicking a button / input inside
    if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT') return;
    // 只有真正拖动才阻止默认行为，纯点击不干预
    const startX = e.clientX, startY = e.clientY;
    let dragStarted = false;
    const r0 = el.getBoundingClientRect();
    offX = e.clientX - r0.left;
    offY = e.clientY - r0.top;

    function onMove(e){
      if(!dragStarted){
        if(Math.abs(e.clientX-startX)<4 && Math.abs(e.clientY-startY)<4) return;
        // 超过4px才算拖拽开始
        dragStarted = true;
        e.preventDefault();
        dragging = el;
        const r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
        ghost = mkGhost(el);
        el.style.opacity = '0.3';
      }
      ghost.style.left = (e.clientX-offX)+'px';
      ghost.style.top  = (e.clientY-offY)+'px';
      // find target sibling
      ghost.style.display='none';
      const under = document.elementFromPoint(e.clientX, e.clientY);
      ghost.style.display='';
      const target = under && under.closest(itemSel);
      siblings().forEach(s=>s.classList.remove('drag-over-top','drag-over-bottom','drag-over-left','drag-over-right'));
      if(target && target!==dragging && container.contains(target)){
        const r2=target.getBoundingClientRect();
        // detect grid vs list by comparing widths
        const isGrid = (r2.width < container.getBoundingClientRect().width * 0.7);
        if(isGrid){
          target.classList.add(e.clientX < r2.left+r2.width/2 ? 'drag-over-left' : 'drag-over-right');
        } else {
          target.classList.add(e.clientY < r2.top+r2.height/2 ? 'drag-over-top' : 'drag-over-bottom');
        }
      }
    }

    function onUp(e){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if(!dragStarted){ dragging=null; return; } // 纯点击，不处理排序
      ghost.remove(); ghost=null;
      dragging.style.opacity='';
      siblings().forEach(s=>s.classList.remove('drag-over-top','drag-over-bottom','drag-over-left','drag-over-right'));

      ghost_pos: {
        const under_final = document.elementFromPoint(e.clientX, e.clientY);
        const target = under_final && under_final.closest(itemSel);
        if(!target || target===dragging || !container.contains(target)) break ghost_pos;
        const r2=target.getBoundingClientRect();
        const isGrid = (r2.width < container.getBoundingClientRect().width * 0.7);
        const before = isGrid
          ? e.clientX < r2.left+r2.width/2
          : e.clientY < r2.top+r2.height/2;
        if(before) container.insertBefore(dragging, target);
        else container.insertBefore(dragging, target.nextSibling);
      }

      // rebuild array from DOM order
      const newOrder = siblings().map(el=>parseInt(el.dataset.idx));
      onReorder(newOrder);
      dragging=null;
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function addDragStyles(){
  if(document.getElementById('drag-reorder-styles')) return;
  const s=document.createElement('style');
  s.id='drag-reorder-styles';
  s.textContent='.drag-over-top{border-top:2px solid var(--cyan)!important;}'
    +'.drag-over-bottom{border-bottom:2px solid var(--cyan)!important;}'
    +'.drag-over-left{border-left:2px solid var(--cyan)!important;}'
    +'.drag-over-right{border-right:2px solid var(--cyan)!important;}'
    +'[data-drag-handle]{cursor:grab;user-select:none;}'
    +'[data-drag-handle]:active{cursor:grabbing;}';
  document.head.appendChild(s);
}

function renderPostList(){
  const el=document.getElementById('post-list');
  el.innerHTML='';
  if(!posts.length){
    el.innerHTML='<div style="padding:20px 16px;font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;">// 暂无文章<br>点击 ＋ 新建</div>';
    return;
  }
  posts.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='post-item'+(currentPost===i?' active':'');
    d.dataset.idx=i;
    d.innerHTML=`
      <span data-drag-handle style="font-size:14px;color:var(--muted);margin-right:8px;flex-shrink:0;" title="拖拽排序">⠿</span>
      <div style="flex:1;min-width:0;">
        <div class="pi-title">${p.title||'（无标题）'}</div>
        <div class="pi-meta">
          <span class="pi-cat">${p.cat||'未分类'}</span>
          <span>${p.date||''}</span>
        </div>
      </div>
      ${p.draft?'<span class="pi-draft">草稿</span>':''}
      <button onclick="deletePost(${i},event)" class="pp-card-del" style="position:static;opacity:0;margin-left:4px;transition:opacity .2s;" title="删除">✕</button>
    `;
    d.onmouseenter=()=>{ const btn=d.querySelector('.pp-card-del'); if(btn)btn.style.opacity='1'; };
    d.onmouseleave=()=>{ const btn=d.querySelector('.pp-card-del'); if(btn)btn.style.opacity='0'; };
    d.onclick=()=>selectPost(i);
    el.appendChild(d);
  });
  addDragStyles();

    const reordered = newOrder.map(i=>posts[i]);

    if(currentPost!==null){
      const cur = reordered.findIndex(p=>p===posts[currentPost]);

  });

/* paste cleaner: strip Word/mso junk, fix table widths */
function _cleanPaste(edId){
  return function(e){
    e.preventDefault();
    let html=(e.clipboardData||window.clipboardData).getData('text/html');
    if(!html){
      const txt=(e.clipboardData||window.clipboardData).getData('text/plain');
      document.execCommand('insertText',false,txt);
      return;
    }
    // Remove mso-* and Office namespace junk
    html=html.replace(/<o:p[^>]*>[\s\S]*?<\/o:p>/gi,'');
    html=html.replace(/<w:[^>]+>[\s\S]*?<\/w:[^>]+>/gi,'');
    html=html.replace(/mso-[a-z\-]+\s*:[^;"]*/gi,'');
    html=html.replace(/\s*style="\s*"/gi,'');
    // Strip fixed pixel widths on tables so margin:auto works
    html=html.replace(/(<table[^>]*)\s+width="\d+[^"]*"/gi,'$1');
    html=html.replace(/(<table[^>]*style="[^"]*)width\s*:\s*\d+px/gi,'$1width:100%');
    // Wrap table in a div.table-wrap for easier targeting
    html=html.replace(/(<table[\s\S]*?<\/table>)/gi,'<div class="table-wrap">$1</div>');
    document.getElementById(edId).focus();
    document.execCommand('insertHTML',false,html);
  };
}
document.getElementById('editor-content').addEventListener('paste',_cleanPaste('editor-content'));
document.getElementById('works-editor-content').addEventListener('paste',_cleanPaste('works-editor-content'));

function _findAlignTarget(ed){
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return null;
  let node=sel.getRangeAt(0).commonAncestorContainer;
  if(node.nodeType===3)node=node.parentElement;
  const blockTags=/^(TABLE|PRE|FIGURE|BLOCKQUOTE|H[1-6]|UL|OL|HR)$/;
  let block=node;
  let divCandidate=null;
  while(block&&block!==ed){
    if(blockTags.test(block.tagName))return block;
    // Prefer .table-wrap divs (our paste wrapper) or any div containing a table
    if(block.tagName==='DIV'){
      if(block.classList.contains('table-wrap'))return block;
      if(!divCandidate)divCandidate=block;
    }
    block=block.parentElement;
  }
  if(divCandidate){
    const tbl=divCandidate.querySelector('table');
    if(tbl)return tbl;
    return divCandidate;
  }
  return null;
}

function _applyAlign(el,align){
  if(align==='center'){
    if(el.style.width&&el.style.width.endsWith('px'))el.style.width='100%';
    el.style.marginLeft='auto';
    el.style.marginRight='auto';
    el.style.textAlign='center';
    if(el.tagName==='TABLE')el.style.display='table';
  } else if(align==='left'){
    el.style.marginLeft='0';
    el.style.marginRight='auto';
    el.style.textAlign='left';
  } else {
    el.style.marginLeft='auto';
    el.style.marginRight='0';
    el.style.textAlign='right';
  }
}

function exec(cmd,val=null){
  const ed=document.getElementById('editor-content');
  ed.focus();
  if(cmd==='justifyCenter'||cmd==='justifyLeft'||cmd==='justifyRight'){
    const target=_findAlignTarget(ed);
    if(target){
      _applyAlign(target,cmd==='justifyCenter'?'center':cmd==='justifyLeft'?'left':'right');
      return;
    }
  }
  document.execCommand(cmd,false,val);
}


function fmt(type){
  const ed=document.getElementById('editor-content');
  ed.focus();
  const sel=window.getSelection();
  const text=sel.toString()||'';
  let node;
  if(type==='h1'){node=document.createElement('h1');node.textContent=text||'标题一';}
  else if(type==='h2'){node=document.createElement('h2');node.textContent=text||'标题二';}
  else if(type==='h3'){node=document.createElement('h3');node.textContent=text||'标题三';}
  else if(type==='ul'){document.execCommand('insertUnorderedList');return;}
  else if(type==='ol'){document.execCommand('insertOrderedList');return;}
  else if(type==='blockquote'){
    node=document.createElement('blockquote');node.textContent=text||'引用内容';
  }
  else if(type==='hr'){
    document.execCommand('insertHTML',false,'<hr>');return;
  }
  if(node){
    if(sel.rangeCount){
      const range=sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(node);
      range.setStartAfter(node);
      sel.removeAllRanges();sel.addRange(range);
    } else {
      ed.appendChild(node);
    }
  }
}

function doFind(){

  const stat=document.getElementById('find-stat');
  const ed=document.getElementById(_findEdId||'editor-content');
  if(!q||!ed){ stat.textContent=''; return; }
  // count occurrences in text
  const text=ed.innerText||'';
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  const matches=(text.match(re)||[]).length;
  stat.textContent=matches>0?'找到 '+matches+' 处匹配':'未找到';
  stat.style.color=matches>0?'var(--cyan)':'var(--magenta)';
}

let currentWork = null;

function renderWorksList(){
  const el = document.getElementById('works-list');
  el.innerHTML = '';
  if(!works.length){
    el.innerHTML = '<div style="padding:20px 16px;font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:1px;">// 暂无项目<br>点击 ＋ 新建</div>';
    return;
  }
  works.forEach((w,i)=>{
    const d = document.createElement('div');
    d.className = 'wi-item' + (currentWork===i?' active':'');
    d.dataset.idx = i;
    d.innerHTML = '<span data-drag-handle style="font-size:14px;color:var(--muted);margin-right:8px;flex-shrink:0;" title="拖拽排序">⠿</span>'
      +'<div style="flex:1;min-width:0;">'
      +'<div class="wi-title">'+(w.title||'（无标题）')+'</div>'
      +'<div class="wi-meta">'+(w.date||'')+(w.tags&&w.tags[0]?' · '+w.tags[0]:'')+'</div>'
      +'</div>'
      +(w.draft!==false?'<span class="wi-draft">草稿</span>':'')
      +'<button onclick="deleteWork('+i+',event)" class="pp-card-del" style="position:static;opacity:0;margin-left:4px;transition:opacity .2s;" title="删除">✕</button>';
    d.onmouseenter=()=>{ const btn=d.querySelector('.pp-card-del'); if(btn)btn.style.opacity='1'; };
    d.onmouseleave=()=>{ const btn=d.querySelector('.pp-card-del'); if(btn)btn.style.opacity='0'; };
    d.onclick = ()=>{ saveCurrentWork(); selectWork(i); };
    el.appendChild(d);
  });
  addDragStyles();
  makeDragList(el, '.wi-item', newOrder=>{
    const reordered = newOrder.map(i=>works[i]);
    const curWork = currentWork!==null ? works[currentWork] : null;
    works.splice(0, works.length, ...reordered);
    if(curWork) currentWork = reordered.indexOf(curWork);
    saveState();
    renderWorksList();
  });
}

function selectWork(i){
  currentWork = i;
  const w = works[i];
  document.getElementById('works-title-input').value = w.title||'';
  document.getElementById('works-tags').value = (w.tags||[]).join(', ');
  document.getElementById('works-date').value = w.date||new Date().toISOString().slice(0,10);
  document.getElementById('works-status').value = w.draft===false?'published':'draft';
  document.getElementById('works-link').value = w.link||'';
  document.getElementById('works-editor-content').innerHTML = w.content||'';
  worksCoverData = w.img||null;
  worksCoverFullData = w.imgFull||null;
  const prev = document.getElementById('works-cover-preview');
  if(worksCoverData){ prev.src=worksCoverData; prev.style.display='block'; }
  else { prev.style.display='none'; }
  // 恢复排版设置
  const layout = w.layout || {};
  document.getElementById('works-layout-width').value    = layout.width    || '720px';
  document.getElementById('works-layout-lh').value       = layout.lh       || '1.9';
  document.getElementById('works-layout-fontsize').value = layout.fontsize || '15px';
  document.getElementById('works-layout-code-size').value= layout.codeSize || '13px';
  document.getElementById('works-layout-pgap').value     = layout.pgap     || '16px';
  renderWorksList();
}

function saveCurrentWork(isDraft=null){
  if(currentWork===null) return;
  const w = works[currentWork];
  w.title = document.getElementById('works-title-input').value||'（无标题）';
  w.tags = document.getElementById('works-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  w.date = document.getElementById('works-date').value||new Date().toISOString().slice(0,10);
  const statusVal = document.getElementById('works-status').value;
  w.draft = isDraft !== null ? isDraft : (statusVal==='published'?false:true);
  w.link = document.getElementById('works-link').value;
  w.content = document.getElementById('works-editor-content').innerHTML;
  w.img = worksCoverData;
  w.imgFull = worksCoverFullData||worksCoverData;
  w.slug = slugify(w.title);
  // 保存排版设置
  w.layout = {
    width:    document.getElementById('works-layout-width').value,
    lh:       document.getElementById('works-layout-lh').value,
    fontsize: document.getElementById('works-layout-fontsize').value,
    codeSize: document.getElementById('works-layout-code-size').value,
    pgap:     document.getElementById('works-layout-pgap').value
  };
  saveState();
  renderWorksList();
}

function newWork(){
  const w={title:'',tags:[],date:new Date().toISOString().slice(0,10),content:'',img:null,link:'',draft:true,slug:''};
  works.unshift(w);
  saveState();
  selectWork(0);
  document.getElementById('works-title-input').focus();
  showToast('info','新项目已创建，开始填写吧');
}

function deleteWork(i, e){
  e.stopPropagation();
  const w=works[i];
  showDeleteModal('确认删除项目「'+(w.title||'无标题')+'」？此操作不可撤销。', ()=>{
    works.splice(i,1);
    if(currentWork===i){ currentWork=null; document.getElementById('works-editor-content').innerHTML=''; }
    else if(currentWork>i){ currentWork--; }
    saveState(); renderWorksList(); showToast('ok','项目已删除 ✓');
  });
}

function wexec(cmd){

    const target=_findAlignTarget(ed);

function wfmt(type){
  const ed=document.getElementById('works-editor-content'); ed.focus();
  const sel=window.getSelection(); const text=sel.toString()||'';
  let node;
  if(type==='h2'){node=document.createElement('h2');node.textContent=text||'标题二';}
  else if(type==='h3'){node=document.createElement('h3');node.textContent=text||'标题三';}
  else if(type==='ul'){document.execCommand('insertUnorderedList');return;}
  else if(type==='ol'){document.execCommand('insertOrderedList');return;}
  else if(type==='blockquote'){node=document.createElement('blockquote');node.textContent=text||'引用内容';}
  else if(type==='hr'){document.execCommand('insertHTML',false,'<hr><p><br></p>');return;}
  if(node){ const p=document.createElement('p'); p.appendChild(document.createTextNode('')); const frag=document.createDocumentFragment(); frag.appendChild(node); frag.appendChild(p); document.execCommand('insertHTML',false,node.outerHTML+'<p><br></p>'); }
}

function setFocusPoint(e, imgEl){
  const rect=imgEl.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width*100).toFixed(1)+'%';
  const y=((e.clientY-rect.top)/rect.height*100).toFixed(1)+'%';
  const pos=x+' '+y;
  const mode=document.getElementById('card-modal').dataset.mode;
  if(mode==='catitem') catItemImgPos=pos;
  else cardImgPos=pos;
  const dot=document.getElementById('focus-dot');
  dot.style.left=x; dot.style.top=y;
  document.getElementById('card-img-preview').style.objectPosition=pos;
  showToast('info','焦点已设置：'+x+' '+y);
}

function weInsertVideo(){
  const url=prompt('请粘贴 B站 或 YouTube 视频链接：');
  if(!url)return;
  let embedUrl='';
  // B站 BV/av
  const bvMatch=url.match(/BV[\w]+/);
  const avMatch=url.match(/av(\d+)/i);
  const aidMatch=url.match(/[?&]aid=(\d+)/);
  if(bvMatch){
    embedUrl='https://player.bilibili.com/player.html?bvid='+bvMatch[0]+'&page=1&high_quality=1&autoplay=0';
  } else if(avMatch||aidMatch){
    const aid=(avMatch?avMatch[1]:(aidMatch?aidMatch[1]:''));
    embedUrl='https://player.bilibili.com/player.html?aid='+aid+'&page=1&high_quality=1&autoplay=0';
  }
  // YouTube
  const ytMatch=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([-\w]+)/);
  if(ytMatch) embedUrl='https://www.youtube.com/embed/'+ytMatch[1];
  if(!embedUrl){showToast('err','无法识别链接，请粘贴 B站或 YouTube 链接');return;}
  const html='<div class="video-embed"><iframe src="'+embedUrl+'" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div><p><br></p>';
  const ed=document.getElementById('works-editor-content');
  ed.focus();
  document.execCommand('insertHTML',false,html);
}

/* ══════════════════════════════════════
   TOKEN CRYPTO  (AES-256-GCM, key from PBKDF2)
   index.html 和 admin.html 共用同一份密文
   localStorage key: "gh_token_enc"
══════════════════════════════════════ */
let __aesKey = null; // 登录后在内存持有，页面关闭即消失

async function deriveKey(password) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode('gh-token-salt-v1'), iterations:200000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptToken(token) {
  if (!__aesKey || !token) return;
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, __aesKey, new TextEncoder().encode(token));
  const b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
  localStorage.setItem('gh_token_enc', b64(iv)+':'+b64(ct));
}
async function decryptToken() {
  if (!__aesKey) return null;
  const stored = localStorage.getItem('gh_token_enc');
  if (!stored) return null;
  try {
    const [ivB64,ctB64] = stored.split(':');
    const fb64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
    const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:fb64(ivB64)}, __aesKey, fb64(ctB64));
    return new TextDecoder().decode(pt);
  } catch { return null; }
}
let GH={user:'',repo:'',token:''};

async function loadGhConfig(){
  GH.user  = localStorage.getItem('gh_user')  || '';
  GH.repo  = localStorage.getItem('gh_repo')  || '';
  const t = await decryptToken();
  if(t) GH.token = t;
}
function openGhConfig(){
  document.getElementById('gh-user').value  = GH.user;
  document.getElementById('gh-repo').value  = GH.repo;
  decryptToken().then(t=>{ document.getElementById('gh-token').value = t || GH.token || ''; });

}
function closeGhConfig(){document.getElementById('gh-modal').classList.remove('show');}
function saveGhConfig(){
  const user=document.getElementById('gh-user').value.trim();

  GH.user=user; GH.repo=repo; GH.token=token;
  localStorage.setItem('gh_user',GH.user);
  localStorage.setItem('gh_repo',GH.repo);
  encryptToken(token); // save encrypted token
  localStorage.removeItem('gh_token'); // remove any old plaintext token
  closeGhConfig();
  showToast('ok','GitHub 配置已保存 ✓');
}

function setStatus(type,msg){
  const el=document.getElementById('tb-status');
  el.className='tb-status '+type;
  el.textContent=msg;
}

function pushLog(msg,type='info'){
  const log=document.getElementById('push-log');
  const body=document.getElementById('push-log-body');
  log.classList.add('show');
  const d=document.createElement('div');
  d.className='pl-'+type;
  const icons={info:'// ',ok:'✓ ',err:'✕ ',spin:'⟳ '};
  d.textContent=(icons[type]||'')+msg;
  body.appendChild(d);
  body.scrollTop=body.scrollHeight;
}

async function ghPut(path,content,msg){
  const apiBase=`https://api.github.com/repos/${GH.user}/${GH.repo}/contents/${path}`;
  const headers={'Authorization':`token ${GH.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  const encoded=btoa(unescape(encodeURIComponent(content)));
  let sha=null;
  const getRes=await fetch(apiBase,{headers});
  if(getRes.ok){const d=await getRes.json();sha=d.sha;}
  else if(getRes.status===401){throw new Error('Token 无效，请检查 GitHub 配置');}
  else if(getRes.status===403){throw new Error('Token 权限不足，请勾选 repo 权限');}
  const body={message:msg,content:encoded,...(sha?{sha}:{})};
  const putRes=await fetch(apiBase,{method:'PUT',headers,body:JSON.stringify(body)});
  if(!putRes.ok){const d=await putRes.json().catch(()=>({}));throw new Error(d.message||'推送失败 HTTP '+putRes.status);}
}

async function patchHomeHTML(){
  const apiBase = `https://api.github.com/repos/${GH.user}/${GH.repo}/contents/index.html`;
  const headers = {'Authorization':`token ${GH.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  const getRes = await fetch(apiBase, {headers});
  if(!getRes.ok) throw new Error('获取首页失败 HTTP '+getRes.status);
  const fileData = await getRes.json();

  // 稳健的 base64 → UTF-8 解码
  const b64 = fileData.content.replace(/\s/g,'');
  const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  let html = new TextDecoder('utf-8').decode(bytes);

  // HTML转义函数
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#x60;');

  // 生成 posts 静态列表
  const publishedPosts = posts.filter(p=>!p.draft&&p.title).slice(0,6);
  const postsHTML = publishedPosts.length
    ? publishedPosts.map(p=>
        '<a class="post-item" href="/blog/'+esc(p.slug)+'.html">'
        +'<span class="post-drag-handle" style="display:none">\u283f</span>'
        +'<span class="post-date">'+esc(p.date||'')+'</span>'
        +'<span class="post-cat">'+esc(p.cat||'\u672a\u5206\u7c7b')+'</span>'
        +'<span class="post-title">'+esc(p.title)+'</span>'
        +'<span class="post-arrow">\u2192</span>'
        +'</a>'
      ).join('')
    : '<div class="no-posts-placeholder" style="font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:2px;padding:20px 24px;">'
      +'// \u6682\u65e0\u5df2\u53d1\u5e03\u6587\u7ae0 \u00b7 \u8bf7\u5728\u540e\u53f0\u53d1\u5e03\u6587\u7ae0\u540e\u63a8\u9001</div>';

  // 生成 works 静态卡片
  const publishedWorks = works.filter(w=>w.draft===false&&w.title).slice(0,6);
  const worksHTML = publishedWorks.map(w=>{
    const slug=w.slug||slugify(w.title);
    return '<a class="proj-card" href="/works/'+esc(slug)+'.html">'
      +'<div class="card-controls"><div class="card-drag-handle">\u283f\u283f</div>'
      +'<button class="card-delete" onclick="this.closest(\'.proj-card\').remove()">\u2715</button></div>'
      +'<div class="proj-tag">// '+esc(((w.tags||[])[0]?w.tags[0].toUpperCase():'PROJECT'))+'</div>'
      +'<div class="proj-name">'+esc(w.title)+'</div>'
      +'<div class="proj-desc">'+esc(w.desc||'')+'</div>'
      +'<div class="proj-meta">'+(w.tags||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>'
      +'</a>';
  }).join('') + '<button class="add-card-btn" onclick="addProject(this)">\uff0b \u6dfb\u52a0\u9879\u76ee</button>';

  // 验证拉取到的是正确版本的 index.html
  if(html.indexOf('id="dynamic-posts-list"') === -1){
    throw new Error('首页结构不匹配：GitHub 上的 index.html 可能是旧版本，请先手动推送一次带编辑功能的 index.html');
  }

  // 替换 dynamic-posts-list 内容
  const postsId = html.indexOf('id="dynamic-posts-list"');
  if(postsId !== -1){
    const innerStart = html.indexOf('>', postsId) + 1;
    // 找结束标记：add-post-btn 按钮，容错空白
    let addBtnIdx = html.indexOf('add-post-btn', innerStart);
    if(addBtnIdx !== -1){
      // 往前找 < 
      addBtnIdx = html.lastIndexOf('<', addBtnIdx);
      html = html.slice(0, innerStart) + postsHTML + html.slice(addBtnIdx);
    } else {
      // 找 </div> 作为后备
      const divEnd = html.indexOf('</div>', innerStart);
      if(divEnd !== -1) html = html.slice(0, innerStart) + postsHTML + html.slice(divEnd);
    }
  }

  // 替换 dynamic-works-grid 内容
  const worksId = html.indexOf('id="dynamic-works-grid"');
  if(worksId !== -1){
    const innerStart = html.indexOf('>', worksId) + 1;
    const secEnd = html.indexOf('</section>', innerStart);
    if(secEnd !== -1){
      const innerEnd = html.lastIndexOf('</div>', secEnd);
      if(innerEnd !== -1) html = html.slice(0, innerStart) + '\n    ' + worksHTML + '\n  ' + html.slice(innerEnd);
    }
  }

  await ghPut('index.html', html, 'update: homepage dynamic content');
}

  }

  // 收集所有正在使用的图片 URL
  const usedUrls = new Set();
  posts.forEach(p=>{ if(p.cover) usedUrls.add(p.cover); });
  works.forEach(w=>{ if(w.img) usedUrls.add(w.img); if(w.imgFull) usedUrls.add(w.imgFull); });
  galleryCategories.forEach(cat=>cat.items.forEach(item=>{
    if(item.img) usedUrls.add(item.img); if(item.imgFull) usedUrls.add(item.imgFull);
  }));

  // 从 GitHub 获取 images/ 和 images/full/ 目录
  const headers = {'Authorization':`token ${GH.token}`,'Accept':'application/vnd.github.v3+json'};
  _imgList = [];
  try{
    for(const dir of ['images','images/full']){
      const res = await fetch(`https://api.github.com/repos/${GH.user}/${GH.repo}/contents/${dir}`, {headers});
      if(!res.ok) continue;
      const files = await res.json();
      files.filter(f=>f.type==='file').forEach(f=>{
        const url = `https://cdn.jsdelivr.net/gh/${GH.user}/${GH.repo}@main/${f.path}`;
        _imgList.push({
          name: f.name,
          path: f.path,
          sha:  f.sha,
          size: f.size,
          url,
          used: usedUrls.has(url)
        });
      });
    }
  }catch(e){
    body.innerHTML = '<div style="font-family:var(--font-mono);font-size:11px;color:var(--magenta);letter-spacing:2px;">// 加载失败：'+e.message+'</div>';
    return;
  }

  _imgSelected.clear();
  _renderImageList(body);
}

  // 使用中
  if(used.length){
    html += '<div style="font-family:var(--font-mono);font-size:10px;color:var(--cyan);letter-spacing:3px;margin-bottom:12px;">// 使用中 · '+used.length+' 张</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">';
    used.forEach(f=>{ html += _imgCard(f, true); });
    html += '</div>';
  }

  if(!_imgList.length) html = '<div style="font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:2px;padding:20px 0;">// images/ 目录下暂无图片</div>';

  body.innerHTML = html;
}

function _imgCard(f, isUsed){
  const sel = _imgSelected.has(f.path);
  const kb  = (f.size/1024).toFixed(1)+'KB';
  const border = sel ? '2px solid var(--cyan)' : (isUsed ? '1px solid rgba(0,245,255,.15)' : '1px solid rgba(255,0,110,.2)');
  const epath = f.path.replace(/"/g,'&quot;');
  return '<div data-imgpath="'+epath+'" onclick="_toggleSelectEl(this)" style="background:var(--dim);border:'+border+';cursor:pointer;position:relative;transition:border .15s;">'
    +(sel?'<div style="position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--bg);z-index:1;">✓</div>':'')
    +(isUsed?'<div style="position:absolute;top:6px;left:6px;font-family:var(--font-mono);font-size:8px;color:var(--cyan);background:rgba(3,8,16,.85);padding:2px 5px;letter-spacing:1px;z-index:1;">使用中</div>':'')
    +'<img src="'+f.url+'" style="width:100%;height:120px;object-fit:cover;display:block;">'
    +'<div style="padding:8px 10px;">'
    +'<div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+f.name+'</div>'
    +'<div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px;">'+kb+'</div>'
    +'</div></div>';
}

function _toggleSelectEl(el){
  const path = el.dataset.imgpath;
  if(!path) return;
  _toggleSelect(path);
}
function _toggleSelect(path){
  if(_imgSelected.has(path)) _imgSelected.delete(path);
  else _imgSelected.add(path);
  const deleteBtn = document.getElementById('img-delete-btn');
  if(deleteBtn) deleteBtn.style.display = _imgSelected.size>0 ? '' : 'none';
  _renderImageList(document.getElementById('pp-body'));
}

function _selectAllImages(){
  _imgList.forEach(f=>_imgSelected.add(f.path));
  const deleteBtn = document.getElementById('img-delete-btn');
  if(deleteBtn) deleteBtn.style.display = _imgSelected.size>0 ? '' : 'none';
  _renderImageList(document.getElementById('pp-body'));
}
function _selectAll(){
  _imgList.filter(f=>!f.used).forEach(f=>_imgSelected.add(f.path));
  const deleteBtn = document.getElementById('img-delete-btn');
  if(deleteBtn) deleteBtn.style.display = _imgSelected.size>0 ? '' : 'none';
  _renderImageList(document.getElementById('pp-body'));
}

function _selectNone(){
  _imgSelected.clear();
  const deleteBtn = document.getElementById('img-delete-btn');
  if(deleteBtn) deleteBtn.style.display = 'none';
  _renderImageList(document.getElementById('pp-body'));
}

async function _deleteSelected(){
  if(_imgSelected.size===0) return;
  if(!confirm('确认删除选中的 '+_imgSelected.size+' 张图片？此操作不可撤销。')) return;

  const headers = {'Authorization':`token ${GH.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  const toDelete = _imgList.filter(f=>_imgSelected.has(f.path));
  const body = document.getElementById('pp-body');
  body.innerHTML = '<div style="font-family:var(--font-mono);font-size:11px;color:var(--yellow);letter-spacing:2px;padding:20px 0;">⟳ 正在删除...</div>';

  let ok=0, fail=0;
  for(const f of toDelete){
    try{
      const res = await fetch(`https://api.github.com/repos/${GH.user}/${GH.repo}/contents/${f.path}`,{
        method:'DELETE', headers,
        body: JSON.stringify({message:'delete image: '+f.name, sha: f.sha})
      });
      if(res.ok){ ok++; delete _shaCache[f.path]; }
      else { fail++; console.warn('delete failed', f.path, res.status); }
    }catch(e){ fail++; }
  }

  showToast(fail===0?'ok':'info', '已删除 '+ok+' 张'+(fail>0?' · '+fail+' 张失败':''));
  await renderImagesPanel();
}

function cleanContent(html){
  if(!html)return '';
  // Collapse 2+ consecutive empty paragraphs into a single one
  html=html.replace(/(<p[^>]*>\s*(<br\s*\/>|&nbsp;)?\s*<\/p>\s*){2,}/gi,'<p><br></p>');
  // Remove empty paragraphs immediately after block elements (h1-h6, table, pre, figure, blockquote, hr, div)
  html=html.replace(/(<\/(h[1-6]|table|pre|figure|blockquote|div)>)\s*(<p[^>]*>\s*(<br\s*\/>|&nbsp;)?\s*<\/p>\s*)+/gi,'$1');
  // Remove empty paragraphs immediately before block elements
  html=html.replace(/(<p[^>]*>\s*(<br\s*\/>|&nbsp;)?\s*<\/p>\s*)+(<(h[1-6]|table|pre|figure|blockquote|div))/gi,'<$4');
  // Remove empty paragraphs at very start and end
  html=html.replace(/^(\s*<p[^>]*>\s*(<br\s*\/>|&nbsp;)?\s*<\/p>\s*)+/i,'');
  html=html.replace(/(\s*<p[^>]*>\s*(<br\s*\/>|&nbsp;)?\s*<\/p>\s*)+$/i,'');
  return html;
}

    '  }\n'+
    '  im.onload=function(){\n'+

    '})();\n'+
    '</scr'+'ipt>'
  ):'';
  return '<!DOCTYPE html>\n'+

let _uploadStatusTimer = null;

function showCardUploadStatus(state, msg){
  const el = document.getElementById('card-upload-status');
  const spinner = document.getElementById('card-us-spinner');
  const msgEl = document.getElementById('card-us-msg');
  if(state === 'hidden'){ el.style.display='none'; return; }
  el.style.display = 'flex';
  spinner.style.display = state === 'loading' ? 'block' : 'none';
  msgEl.textContent = msg;
  if(state === 'ok') msgEl.style.color = 'var(--green)';
  else if(state === 'err') msgEl.style.color = 'var(--magenta)';
  else msgEl.style.color = 'var(--yellow)';
  if(state !== 'loading') setTimeout(()=>showCardUploadStatus('hidden',''), 3000);
}
function showUploadStatus(state, msg){
  const el = document.getElementById('upload-status');
  const spinner = document.getElementById('us-spinner');
  const msgEl = document.getElementById('us-msg');
  el.className = 'show state-' + state;
  msgEl.textContent = msg;
  spinner.style.display = state === 'loading' ? 'block' : 'none';
  if(_uploadStatusTimer) clearTimeout(_uploadStatusTimer);
  if(state !== 'loading'){
    _uploadStatusTimer = setTimeout(()=>{ el.classList.remove('show'); }, 3000);
  }
}
function hideUploadStatus(){
  document.getElementById('upload-status').classList.remove('show');
}

let _toastTimer=null;
function showToast(type,msg){
  const el=document.getElementById('toast');
  el.className='show '+type;
  el.textContent=msg;
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.className='';},3000);
}

/* ══════════════════════════════════════
   IMAGE UPLOAD TO GITHUB
   图片推送到 images/ 文件夹，返回可访问 URL
══════════════════════════════════════ */
async function uploadImageToGH(file){
  // Read file as base64
  const base64 = await new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>res(e.target.result.split(',')[1]); // strip data:...;base64, prefix
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });

  // Build a unique filename
  const ext=file.name.split('.').pop().toLowerCase()||'jpg';
  const fname='images/'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+'.'+ext;
  const apiUrl=`https://api.github.com/repos/${GH.user}/${GH.repo}/contents/${fname}`;
  const headers={
    'Authorization':`token ${GH.token}`,
    'Content-Type':'application/json',
    'Accept':'application/vnd.github.v3+json'
  };

  const res=await fetch(apiUrl,{
    method:'PUT',
    headers,
    body:JSON.stringify({
      message:'upload image: '+fname,
      content:base64
    })
  });

  if(!res.ok){
    const d=await res.json().catch(()=>({}));
    if(res.status===401) throw new Error('GitHub Token 无效');
    if(res.status===403) throw new Error('Token 权限不足，请勾选 repo');
    if(res.status===422) throw new Error('文件已存在');
    throw new Error(d.message||'HTTP '+res.status);
  }

  // Return the raw GitHub Pages URL
  const data=await res.json();
  // Use jsdelivr CDN for faster loading in China
  const rawUrl=`https://cdn.jsdelivr.net/gh/${GH.user}/${GH.repo}@main/${fname}`;
  return rawUrl;
}

/* ══════════════════════════════════════
   CHANGE PASSWORD
══════════════════════════════════════ */
function openCpwModal(){
  ['cpw-old','cpw-new','cpw-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cpw-err').textContent='';
  document.getElementById('cpw-modal').classList.add('show');
  setTimeout(()=>document.getElementById('cpw-old').focus(),80);
}
function closeCpwModal(){
  document.getElementById('cpw-modal').classList.remove('show');
}
async function submitCpw(){
  const oldVal=document.getElementById('cpw-old').value;
  const newVal=document.getElementById('cpw-new').value;
  const cfmVal=document.getElementById('cpw-confirm').value;
  const errEl=document.getElementById('cpw-err');
  errEl.textContent='';
  if(!oldVal||!newVal||!cfmVal){errEl.textContent='// 请填写所有字段';return;}
  if(newVal.length<6){errEl.textContent='// 新密码至少需要 6 位';return;}
  if(newVal!==cfmVal){errEl.textContent='// 两次输入的密码不一致';return;}
  const oldHash=await sha256(oldVal);
  if(oldHash!==PW_HASH){errEl.textContent='// 当前密码错误';return;}
  // Re-encrypt token with new password before updating key
  const oldKey = __aesKey;
  const newKey = await deriveKey(newVal);
  if (oldKey && localStorage.getItem('gh_token_enc')) {
    const token = await decryptToken();
    if (token) { __aesKey = newKey; await encryptToken(token); }
    else { __aesKey = newKey; }
  } else {
    __aesKey = newKey;
  }
  PW_HASH=await sha256(newVal);
  localStorage.setItem('_pw_hash', PW_HASH); // 同步到 index.html 共享的 localStorage key
  closeCpwModal();
  showToast('ok','密码已修改并同步 ✓ · 首页和后台均已生效');
}
</script>
