<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>游戏项目 · _DEV.LOG</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap');
:root{--bg:#030810;--dim:#0a1628;--text:#c8e0f0;--muted:#3a5a7a;--cyan:#00f5ff;--magenta:#ff006e;--yellow:#ffe600;--glow-c:0 0 8px #00f5ff88,0 0 24px #00f5ff44;--glow-m:0 0 8px #ff006e88,0 0 24px #ff006e44;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.015) 2px,rgba(0,245,255,.015) 4px);pointer-events:none;z-index:100;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;animation:gridShift 20s linear infinite;}
@keyframes gridShift{to{transform:translateY(60px);}}
nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:linear-gradient(180deg,rgba(3,8,16,.95),transparent);border-bottom:1px solid rgba(0,245,255,.1);}
.nav-logo{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--cyan);letter-spacing:4px;text-shadow:var(--glow-c);text-decoration:none;}
.nav-logo span{color:var(--magenta);}
.nav-links{display:flex;gap:28px;}
.nav-links a{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--cyan);transition:width .3s;}
.nav-links a:hover{color:var(--cyan);}
.nav-links a:hover::after{width:100%;}
.page-wrap{position:relative;z-index:1;padding:120px 10vw 80px;}

.page-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--magenta);letter-spacing:4px;margin-bottom:12px;}
.page-heading{font-size:42px;font-weight:700;color:#fff;margin-bottom:48px;}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;}
.work-card{background:#0a1628;border:1px solid rgba(0,245,255,.1);transition:border-color .3s,transform .3s;display:block;text-decoration:none;cursor:pointer;}
.work-card:hover{border-color:rgba(0,245,255,.4);transform:translateY(-4px);}
.wc-img{width:100%;height:200px;object-fit:cover;border-bottom:1px solid rgba(0,245,255,.1);display:block;}
.wc-img-ph{width:100%;height:200px;background:rgba(0,245,255,.04);border-bottom:1px solid rgba(0,245,255,.1);}
.wc-body{padding:24px;}
.wc-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:10px;}
.wc-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
.wc-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.wc-tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);border:1px solid rgba(0,245,255,.3);padding:3px 8px;letter-spacing:1px;}
.wc-link{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);text-decoration:none;letter-spacing:2px;transition:opacity .2s;}
.wc-link:hover{opacity:.7;}
</style></head><body>
<nav>
  <div class="nav-logo">_<span>DEV</span>.LOG</div>
  <div class="nav-links">
    <a href="/">首页</a>
    <a href="/blog/">博客</a>
    <a href="/works/">项目</a>
    <a href="/gallery/">创作</a>
    <a href="/about/">关于</a>
  </div>
</nav>
<div class="page-wrap">
  <div class="page-title">// WORKS</div>
  <h1 class="page-heading">游戏开发</h1>
  <div class="works-grid"><a class="work-card" href="/works/希望-熄忘.html">
      <div class="wc-img-ph"></div>
      <div class="wc-body">
        <div class="wc-title">希望 熄忘</div>
        <div class="wc-desc"></div>
        <div class="wc-tags"><span class="wc-tag">IN PROGRESS</span><span class="wc-tag">ROGUELIKE</span><span class="wc-tag">CARDGAME</span><span class="wc-tag">UNITY</span></div>
      </div></a></div>
</div>
<script>
(function(){
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('dragstart',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&(e.key==='s'||e.key==='S'||e.key==='p'||e.key==='P'))e.preventDefault();
    if(e.key==='PrintScreen')e.preventDefault();
  });
})();
</script>
</body></html>
