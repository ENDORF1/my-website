<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>_DEV.LOG — 个人主页</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap');
:root{--bg:#030810;--dim:#0a1628;--text:#c8e0f0;--muted:#3a5a7a;--cyan:#00f5ff;--magenta:#ff006e;--yellow:#ffe600;--glow-c:0 0 8px #00f5ff88,0 0 24px #00f5ff44;--glow-m:0 0 8px #ff006e88,0 0 24px #ff006e44;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.015) 2px,rgba(0,245,255,.015) 4px);pointer-events:none;z-index:100;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;animation:gridShift 20s linear infinite;}
@keyframes gridShift{to{transform:translateY(60px);}}
nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:linear-gradient(180deg,rgba(3,8,16,.95),transparent);border-bottom:1px solid rgba(0,245,255,.1);}
.nav-logo{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--cyan);letter-spacing:4px;text-shadow:var(--glow-c);text-decoration:none;}
.nav-logo span{color:var(--magenta);}
.nav-links{display:flex;gap:28px;}
.nav-links a{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--cyan);transition:width .3s;}
.nav-links a:hover{color:var(--cyan);}
.nav-links a:hover::after{width:100%;}
.page-wrap{position:relative;z-index:1;padding:120px 10vw 80px;}

/* hero */
#hero{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 10vw;overflow:hidden;}
.hero-tag{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--magenta);letter-spacing:4px;margin-bottom:20px;text-shadow:var(--glow-m);}
.hero-name{font-size:clamp(48px,8vw,100px);font-weight:700;line-height:.95;color:#fff;letter-spacing:-2px;}
.line2{color:transparent;-webkit-text-stroke:1px var(--cyan);display:block;filter:drop-shadow(0 0 20px var(--cyan));}
.hero-sub{margin-top:24px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:2px;line-height:1.8;max-width:500px;}
.hero-sub .hl{color:var(--cyan);}
.hero-btns{margin-top:40px;display:flex;gap:16px;}
.btn-primary{padding:12px 28px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;position:relative;overflow:hidden;transition:color .3s;}
.btn-primary::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-101%);transition:transform .3s ease;}
.btn-primary:hover{color:var(--bg);}
.btn-primary:hover::before{transform:translateX(0);}
.btn-sec{padding:12px 28px;background:transparent;border:1px solid var(--muted);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;transition:border-color .3s,color .3s;}
.btn-sec:hover{border-color:var(--magenta);color:var(--magenta);}
.hero-deco{position:absolute;right:8vw;top:50%;transform:translateY(-50%);width:320px;height:320px;border:1px solid rgba(0,245,255,.15);border-radius:50%;animation:spin 20s linear infinite;pointer-events:none;}
.hero-deco::before{content:'';position:absolute;inset:20px;border:1px solid rgba(255,0,110,.15);border-radius:50%;animation:spin 12s linear infinite reverse;}
.hero-deco::after{content:'';position:absolute;inset:60px;border:1px solid rgba(0,245,255,.2);border-radius:50%;animation:spin 8s linear infinite;}
.hero-deco-center{position:absolute;right:8vw;top:50%;transform:translate(140px,-50%) translate(-50%,0);width:40px;height:40px;background:var(--magenta);border-radius:50%;box-shadow:var(--glow-m);animation:pulse 2s ease-in-out infinite;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{transform:translate(140px,-50%) translate(-50%,0) scale(1);}50%{transform:translate(140px,-50%) translate(-50%,0) scale(1.3);opacity:.7;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
/* sections */
.home-section{position:relative;z-index:1;padding:80px 10vw;}
.sec-header{display:flex;align-items:center;gap:20px;margin-bottom:48px;}
.sec-num{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--magenta);letter-spacing:3px;}
.sec-title{font-size:32px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);opacity:.3;}
.sec-more{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-decoration:none;transition:color .2s;}
.sec-more:hover{color:var(--cyan);}
/* works */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.proj-card-live{background:var(--dim);border:1px solid rgba(0,245,255,.1);padding:0;overflow:hidden;transition:border-color .3s,transform .3s;display:block;text-decoration:none;position:relative;}
.proj-card-live::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--magenta));transform:scaleX(0);transform-origin:left;transition:transform .4s;}
.proj-card-live:hover{border-color:rgba(0,245,255,.4);transform:translateY(-4px);}
.proj-card-live:hover::before{transform:scaleX(1);}
.proj-card-live .wc-img{width:100%;height:180px;object-fit:cover;border-bottom:1px solid rgba(0,245,255,.1);display:block;}
.proj-card-live .wc-img-ph{width:100%;height:180px;background:rgba(0,245,255,.04);border-bottom:1px solid rgba(0,245,255,.1);}
.proj-card-live .proj-tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--magenta);letter-spacing:2px;margin:20px 24px 8px;text-transform:uppercase;}
.proj-card-live .proj-name{font-size:18px;font-weight:700;color:#fff;margin:0 24px 8px;}
.proj-card-live .proj-desc{font-size:13px;color:var(--muted);line-height:1.6;margin:0 24px 12px;}
.proj-card-live .proj-meta{display:flex;gap:6px;flex-wrap:wrap;padding:0 24px 20px;}
.tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan);border:1px solid rgba(0,245,255,.3);padding:2px 7px;letter-spacing:1px;}
/* blog */
.post-item{display:flex;align-items:center;padding:18px 24px;background:var(--dim);border-left:2px solid transparent;transition:border-color .3s,background .3s;text-decoration:none;gap:20px;margin-bottom:2px;}
.post-item:hover{border-left-color:var(--cyan);background:rgba(0,245,255,.04);}
.post-date{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;min-width:90px;}
.post-cat{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--magenta);letter-spacing:2px;min-width:80px;text-transform:uppercase;}
.post-title{font-size:15px;font-weight:600;color:var(--text);flex:1;}
.post-item:hover .post-title{color:#fff;}
.post-arrow{font-family:'Share Tech Mono',monospace;color:var(--muted);font-size:14px;transition:transform .2s,color .2s;}
.post-item:hover .post-arrow{transform:translateX(6px);color:var(--cyan);}
.no-posts{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:2px;padding:20px 0;}
/* gallery */
.creations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.creation-card-live{background:var(--dim);border:1px solid rgba(255,0,110,.1);display:block;text-decoration:none;overflow:hidden;transition:border-color .3s,transform .3s;}
.creation-card-live:hover{border-color:rgba(255,0,110,.5);transform:translateY(-4px);}
.cc-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.cc-img-ph{width:100%;aspect-ratio:3/4;background:rgba(255,0,110,.06);}
.cc-body{padding:14px 16px;}
.cc-type{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--magenta);letter-spacing:3px;margin-bottom:4px;}
.cc-name{font-size:15px;font-weight:700;color:#fff;}
/* footer */
footer{position:relative;z-index:1;padding:40px 10vw;border-top:1px solid rgba(0,245,255,.08);display:flex;align-items:center;justify-content:space-between;}
.footer-text{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;}
.footer-links{display:flex;gap:24px;}
.footer-links a{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:2px;transition:color .2s;}
.footer-links a:hover{color:var(--cyan);}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">_<span>DEV</span>.LOG</div>
  <div class="nav-links">
    <a href="/">首页</a>

  <h1 class="hero-name">

  </h1>
  <p class="hero-sub">独立开发者 · 卡牌游戏制作中<br><span class="hl">明日方舟</span> 开服老玩家 · 同人创作者<br>代码 / 像素 / 故事</p>
  <div class="hero-btns">
    <a href="/works/" class="btn-primary">查看项目</a>

</section>

</div>

<footer>
  <div class="footer-text">© 2025 · BUILT WITH ♥ & CODE</div>

</footer>
</body></html>
